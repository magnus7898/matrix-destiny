<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ნატალური რუქა</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+Georgian:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07071a;color:#e0d8ff;font-family:'Noto Sans Georgian',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}

/* ── HEADER ── */
.page-title{font-family:'Cinzel',serif;color:#a78bfa;margin-bottom:6px;font-size:22px;letter-spacing:3px;text-align:center}
.page-sub{font-size:10px;letter-spacing:3px;color:rgba(167,139,250,0.4);text-align:center;margin-bottom:24px;text-transform:uppercase}

/* ── FORM ── */
.form-wrap{background:#0f0d2a;border:1px solid #2d1f6e;border-radius:12px;padding:20px;width:100%;max-width:600px;margin-bottom:24px}
.row{display:flex;gap:10px;margin-bottom:12px}
.field{flex:1;display:flex;flex-direction:column;gap:4px}
label{font-size:10px;color:#9f8fd4;text-transform:uppercase;letter-spacing:1px}
input{background:#1a1545;border:1px solid #3d2a8a;border-radius:6px;color:#e0d8ff;padding:7px 10px;font-size:13px;width:100%}
input:focus{outline:none;border-color:#7c3aed}
#city-hint{font-size:11px;color:#7c6aad;margin-top:4px;min-height:16px}
.coords input{background:#120f35;color:#7c6aad}
#tz-display{font-size:11px;color:#a78bfa;margin-top:4px;background:#120f35;border-radius:4px;padding:4px 8px;min-height:20px}
button{width:100%;background:#6d28d9;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;cursor:pointer;margin-top:4px;letter-spacing:1px;font-family:'Noto Sans Georgian',sans-serif}
button:hover{background:#7c3aed}

/* ── CHART AREA ── */
#chart-area{width:100%;max-width:760px}
svg#wheel{width:100%;height:auto;display:block}

/* ── TABLES ── */
.tables-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}
@media(max-width:600px){.tables-wrap{grid-template-columns:1fr}}
.table-section h3{color:#a78bfa;font-size:12px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #2d1f6e;letter-spacing:1px;font-family:'Cinzel',serif}
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:#9f8fd4;border-bottom:1px solid #2d1f6e;padding:5px 8px;text-align:left;font-weight:normal;font-size:10px;text-transform:uppercase;letter-spacing:0.8px}
td{padding:5px 8px;border-bottom:1px solid #0f0d28;vertical-align:middle}
tr:hover td{background:#13103a}
.retro{color:#f87171;font-size:10px}
.asp-sym{font-size:16px;font-family:serif}
.house-badge{display:inline-block;background:#1a1545;border:1px solid #3d2a8a;border-radius:4px;padding:1px 5px;font-size:10px;color:#a78bfa}

/* ── PLANET SYMBOL CELL ── */
.p-sym{font-size:20px;font-family:serif;line-height:1;display:inline-block}

/* ── SUN ICON ── */
.sun-icon{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;position:relative}
.sun-core{width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff7d0,#f9c646 40%,#e8a020);box-shadow:0 0 6px 2px rgba(249,198,70,0.7),0 0 14px 4px rgba(249,198,70,0.3);position:relative;z-index:2}
.sun-rays{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.sun-ray{position:absolute;width:2px;height:5px;background:linear-gradient(to top,rgba(249,198,70,0.9),rgba(255,240,150,0.4));border-radius:1px;transform-origin:center 13px}

/* ── DEGREE DISPLAY ── */
.deg-val{font-family:'Cinzel',serif;font-size:12px;color:#c8d8f0;white-space:nowrap}
.deg-min{font-size:10px;color:#7060b0}

/* ── MOBILE FIXES ── */
@media(max-width:480px){
  td{padding:4px 5px;font-size:11px}
  th{font-size:9px;padding:4px 5px}
  .p-sym{font-size:14px}
  .sun-core{width:9px;height:9px}
  .sun-icon{width:20px;height:20px}
  .sun-ray{height:4px;transform-origin:center 10px}
  table{table-layout:fixed}
  td:nth-child(1){width:26px}
  td:nth-child(2){width:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px}
  td:nth-child(3){font-size:11px}
  .asp-sym{font-size:13px}
}
</style>
</head>
<body>

<h1 class="page-title">✦ ნატალური რუქა ✦</h1>
<p class="page-sub">Natal Chart · Placidus Houses</p>

<div class="form-wrap">
  <div class="row">
    <div class="field"><label>სახელი</label><input id="name" placeholder="სახელი"></div>
  </div>
  <div class="row">
    <div class="field"><label>დღე</label><input type="number" id="day" value="1" min="1" max="31"></div>
    <div class="field"><label>თვე</label><input type="number" id="month" value="1" min="1" max="12"></div>
    <div class="field"><label>წელი</label><input type="number" id="year" value="1990"></div>
  </div>
  <div class="row">
    <div class="field"><label>საათი</label><input type="number" id="hour" value="12" min="0" max="23"></div>
    <div class="field"><label>წუთი</label><input type="number" id="minute" value="0" min="0" max="59"></div>
    <div class="field"><label>წამი</label><input type="number" id="second" value="0" min="0" max="59"></div>
  </div>
  <div class="field" style="margin-bottom:8px">
    <label>ქალაქი</label>
    <input id="city" placeholder="მაგ. თბილისი" oninput="searchCity()">
    <div id="city-hint"></div>
  </div>
  <div class="coords row">
    <div class="field"><label>განედი (Lat)</label><input type="number" id="lat" step="0.0001" readonly></div>
    <div class="field"><label>გრძედი (Lon)</label><input type="number" id="lon" step="0.0001" readonly></div>
  </div>
  <div id="tz-display">⏳ ქალაქის შეყვანის შემდეგ სარტყელი განისაზღვრება</div>
  <input type="hidden" id="tz_name" value="UTC">
  <button onclick="generateChart()">✦ რუქის გენერაცია</button>
</div>

<div id="chart-area" style="display:none">
  <svg id="wheel" viewBox="0 0 700 700" xmlns="http://www.w3.org/2000/svg"></svg>

  <div class="tables-wrap">
    <div class="table-section">
      <h3>🪐 პლანეტები</h3>
      <table>
        <thead><tr>
          <th></th><th>პლანეტა</th><th>გრადუსი</th><th>ნიშანი</th><th>სახ.</th><th>მდგ.</th>
        </tr></thead>
        <tbody id="planet-tbody"></tbody>
      </table>
    </div>
    <div class="table-section">
      <h3>🏠 სახლები (Placidus)</h3>
      <table>
        <thead><tr><th>სახლი</th><th>ნიშანი</th><th>გრადუსი</th></tr></thead>
        <tbody id="house-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="table-section" style="margin-top:16px">
    <h3>⚡ ასპექტები</h3>
    <table>
      <thead><tr>
        <th>პლანეტა 1</th><th>ასპ.</th><th>პლანეტა 2</th><th>ტიპი</th><th>ორბი</th>
      </tr></thead>
      <tbody id="aspect-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const BACKEND = 'https://astrology-production-b165.up.railway.app';

const CX=350,CY=350,R1=270,R2=202,R3=135,R4=105;

const SIGN_KA=['ვერძი','კურო','ტყუპები','კირჩხიბი','ლომი','ქალწული',
               'სასწორი','მორიელი','მშვილდოსანი','თხის რქა','მერწყული','თევზები'];
const ZSYM=['♈︎','♉︎','♊︎','♋︎','♌︎','♍︎','♎︎','♏︎','♐︎','♑︎','♒︎','♓︎'];
const ZCOL=['#e05252','#c87c2e','#c8b428','#3a9e6e','#d4821e','#7ab43c',
            '#5ab8c8','#8050c8','#c84040','#7888c8','#50a8e8','#8070d8'];

const PI={
  'მზე':              {sym:'sun', color:'#f9c646'},
  'მთვარე':           {sym:'☽',  color:'#c8d8f0'},
  'მერკური':          {sym:'☿',  color:'#a0c8d0'},
  'ვენერა':           {sym:'♀',  color:'#e87878'},
  'მარსი':            {sym:'♂',  color:'#e84040'},
  'იუპიტერი':         {sym:'♃',  color:'#e89040'},
  'სატურნი':          {sym:'♄',  color:'#c8c840'},
  'ურანი':            {sym:'♅',  color:'#50c8d8'},
  'ნეპტუნი':          {sym:'♆',  color:'#6070d8'},
  'პლუტონი':          {sym:'PL', color:'#c050a0'},
  'ქირონი':           {sym:'⚷',  color:'#d08040'},
  'ლილიტი':           {sym:'⚸',  color:'#904060'},
  'ჩრდ. კვანძი':      {sym:'☊',  color:'#60c060'},
  'სამხ. კვანძი':     {sym:'☋',  color:'#c06060'},
  'ვერტექსი':         {sym:'Vx', color:'#8090d0'},
  'თეთრი მთვარე':     {sym:'SE', color:'#d0e8f8'},
  'ბედის ვარსკვლავი': {sym:'⊕',  color:'#f0c060'},
};

const PORDER=['მზე','მთვარე','მერკური','ვენერა','მარსი',
  'იუპიტერი','სატურნი','ურანი','ნეპტუნი','პლუტონი',
  'ქირონი','ლილიტი','ჩრდ. კვანძი','სამხ. კვანძი',
  'ვერტექსი','თეთრი მთვარე','ბედის ვარსკვლავი'];

// ── DEGREE FORMAT: decimal degrees → D°MM' (real 60-min system) ──
function fmtDeg(fullDeg) {
  const inSign = fullDeg % 30;
  const d = Math.floor(inSign);
  const totalMin = (inSign - d) * 60;
  const m = Math.floor(totalMin);
  const s = Math.round((totalMin - m) * 60);
  return `${d}°${String(m).padStart(2,'0')}'`;
}

// Sun SVG icon with stronger glow
function sunIcon(color='#f9c646') {
  const rays = [];
  for(let i=0;i<8;i++) rays.push(`<line x1="13" y1="2" x2="13" y2="7" stroke="${color}" stroke-width="1.8" stroke-linecap="round" transform="rotate(${i*45} 13 13)" opacity="0.9"/>`);
  return `<svg width="26" height="26" viewBox="0 0 26 26" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;overflow:visible">
    <defs>
      <radialGradient id="sg" cx="38%" cy="38%" r="60%">
        <stop offset="0%" stop-color="#fffde0"/>
        <stop offset="40%" stop-color="${color}"/>
        <stop offset="100%" stop-color="#c07010"/>
      </radialGradient>
      <filter id="sf" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="4" result="g"/>
        <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="13" cy="13" r="9" fill="${color}" opacity="0.08" filter="url(#glow)"/>
    ${rays.join('')}
    <circle cx="13" cy="13" r="5.5" fill="url(#sg)" filter="url(#sf)"/>
    <circle cx="13" cy="13" r="5.5" fill="none" stroke="${color}" stroke-width="0.5" opacity="0.6"/>
  </svg>`;
}

function symCell(info, name) {
  if(name === 'მზე') return sunIcon(info.color);
  // For text symbols (PL, SE, Vx, bQ, Q) use styled span differently
  const isText = info.sym.length > 1 && !/[☽☿♀♂♃♄♅♆⚷⚸☊☋⊕]/u.test(info.sym);
  if(isText) return `<span class="p-sym" style="color:${info.color};font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:-0.5px">${info.sym}</span>`;
  return `<span class="p-sym" style="color:${info.color}">${info.sym}</span>`;
}

let cityTimer=null;
function searchCity(){
  clearTimeout(cityTimer);
  cityTimer=setTimeout(async()=>{
    const city=document.getElementById('city').value;
    if(city.length<2) return;
    try{
      const r=await fetch(`${BACKEND}/geocode`,{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify({city})});
      if(r.ok){
        const d=await r.json();
        if(d.error){document.getElementById('city-hint').textContent='❌ '+d.error;return;}
        document.getElementById('lat').value=d.lat.toFixed(4);
        document.getElementById('lon').value=d.lon.toFixed(4);
        document.getElementById('city-hint').textContent='📍 '+d.display;
        document.getElementById('tz_name').value=d.tz_name||'UTC';
        document.getElementById('tz-display').textContent='🕐 '+d.tz_name+' (ისტორიულად ზუსტი)';
      }else{document.getElementById('city-hint').textContent='❌ ქალაქი ვერ მოიძებნა';}
    }catch(e){document.getElementById('city-hint').textContent='❌ შეცდომა: '+e.message;}
  },600);
}

async function generateChart(){
  const lat=document.getElementById('lat').value;
  const lon=document.getElementById('lon').value;
  if(!lat||!lon){alert('პირველ შეიყვანეთ ქალაქი');return;}
  const payload={
    year:+document.getElementById('year').value,
    month:+document.getElementById('month').value,
    day:+document.getElementById('day').value,
    hour:+document.getElementById('hour').value,
    minute:+document.getElementById('minute').value,
    second:+document.getElementById('second').value,
    lat:+lat,lon:+lon,
    tz_name:document.getElementById('tz_name').value
  };
  try{
    const r=await fetch(`${BACKEND}/chart`,{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await r.json();
    document.getElementById('chart-area').style.display='block';
    drawWheel(data);
    drawPlanetTable(data);
    drawHouseTable(data);
    drawAspectTable(data);
  }catch(e){alert('შეცდომა: '+e.message);}
}

const NS='http://www.w3.org/2000/svg';
function el(tag,attrs,parent){
  const e=document.createElementNS(NS,tag);
  for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if(parent) parent.appendChild(e);
  return e;
}
function txt(parent,s,x,y,attrs){
  const t=el('text',{'text-anchor':'middle','dominant-baseline':'central',x,y,...attrs},parent);
  t.textContent=s;return t;
}
function toRad(d){return d*Math.PI/180;}
function e2s(ecl,asc){return toRad(-(ecl-asc))+Math.PI;}
function pxy(a,r){return{x:CX+Math.cos(a)*r,y:CY+Math.sin(a)*r};}

function drawWheel(data){
  const svg=document.getElementById('wheel');
  svg.innerHTML='';
  const asc=data.asc;

  const defs=el('defs',{},svg);
  const marker=el('marker',{id:'arr',viewBox:'0 0 10 10',refX:'8',refY:'5',
    markerWidth:'5',markerHeight:'5',orient:'auto-start-reverse'},defs);
  el('path',{d:'M2 1L8 5L2 9',fill:'none',stroke:'#c084fc',
    'stroke-width':'1.5','stroke-linecap':'round','stroke-linejoin':'round'},marker);

  // Sun glow filter
  const flt=el('filter',{id:'sunGlow',x:'-50%',y:'-50%',width:'200%',height:'200%'},defs);
  const feg=el('feGaussianBlur',{stdDeviation:'3',result:'blur'},flt);
  const fem=el('feMerge',{},flt);
  el('feMergeNode',{in:'blur'},fem);
  el('feMergeNode',{in:'SourceGraphic'},fem);

  el('rect',{width:700,height:700,fill:'#07071a'},svg);

  // Zodiac band
  for(let i=0;i<12;i++){
    const p=(d,r)=>{const a=e2s(d,asc);return`${CX+Math.cos(a)*r},${CY+Math.sin(a)*r}`;};
    el('path',{
      d:`M${p(i*30,R1)} A${R1},${R1} 0 0,0 ${p((i+1)*30,R1)} L${p((i+1)*30,R2)} A${R2},${R2} 0 0,1 ${p(i*30,R2)} Z`,
      fill:i%2?'#0a0820':'#0f0c28'
    },svg);
  }

  // House band
  for(let i=0;i<12;i++){
    const h1=data.houses[i],h2=data.houses[(i+1)%12];
    const span=((h2-h1)+360)%360,la=span>180?1:0;
    const p=(d,r)=>{const a=e2s(d,asc);return`${CX+Math.cos(a)*r},${CY+Math.sin(a)*r}`;};
    el('path',{
      d:`M${p(h1,R2)} A${R2},${R2} 0 ${la},0 ${p(h2,R2)} L${p(h2,R3)} A${R3},${R3} 0 ${la},1 ${p(h1,R3)} Z`,
      fill:i%2?'#080715':'#0d0b1e'
    },svg);
  }

  // Degree ticks
  for(let deg=0;deg<360;deg++){
    const a=e2s(deg,asc),c=Math.cos(a),s=Math.sin(a);
    const is30=deg%30===0,is10=deg%10===0,is5=deg%5===0;
    const len=is30?22:is10?14:is5?9:4;
    el('line',{
      x1:CX+c*R1,y1:CY+s*R1,x2:CX+c*(R1-len),y2:CY+s*(R1-len),
      stroke:is30?'#d0b0ff':is10?'#9060d0':is5?'#6040a0':'#3d2060',
      'stroke-width':is30?1.8:is10?1.2:is5?0.8:0.4
    },svg);
  }

  // Degree numbers every 10°
  for(let deg=0;deg<360;deg+=10){
    if(deg%30===0) continue;
    const a=e2s(deg,asc);
    const nr=R1-34,nx=CX+Math.cos(a)*nr,ny=CY+Math.sin(a)*nr;
    const rot=(a*180/Math.PI)+90;
    txt(svg,String(deg%30),nx,ny,{fill:'#7050b0','font-size':7,'font-family':'sans-serif',
      transform:`rotate(${rot},${nx},${ny})`});
  }

  // Zodiac dividers
  for(let i=0;i<12;i++){
    const a=e2s(i*30,asc);
    el('line',{x1:CX+Math.cos(a)*R1,y1:CY+Math.sin(a)*R1,
      x2:CX+Math.cos(a)*R2,y2:CY+Math.sin(a)*R2,stroke:'#9070e0','stroke-width':1},svg);
  }

  // Circles
  el('circle',{cx:CX,cy:CY,r:R1,fill:'none',stroke:'#8060d0','stroke-width':2},svg);
  el('circle',{cx:CX,cy:CY,r:R2,fill:'none',stroke:'#5a3fa8','stroke-width':1.2},svg);
  el('circle',{cx:CX,cy:CY,r:R3,fill:'none',stroke:'#3a2878','stroke-width':1},svg);
  el('circle',{cx:CX,cy:CY,r:R4,fill:'#07071a',stroke:'#2d1f6e','stroke-width':1},svg);

  // Zodiac symbols
  const Rzs=(R1+R2)/2;
  for(let i=0;i<12;i++){
    const a=e2s(i*30+15,asc);
    txt(svg,ZSYM[i],CX+Math.cos(a)*Rzs,CY+Math.sin(a)*Rzs,
      {fill:ZCOL[i],'font-size':22,'font-family':'serif','font-weight':'bold'});
  }

  // House lines + numbers
  const Rhn=(R2+R3)/2;
  for(let i=0;i<12;i++){
    const a=e2s(data.houses[i],asc);
    const isAngle=[0,3,6,9].includes(i);
    el('line',{x1:CX+Math.cos(a)*R2,y1:CY+Math.sin(a)*R2,
      x2:CX+Math.cos(a)*R3,y2:CY+Math.sin(a)*R3,
      stroke:isAngle?'#c084fc':'#5030a0','stroke-width':isAngle?2:0.8},svg);
    const next=data.houses[(i+1)%12];
    let mid=data.houses[i]+((next-data.houses[i]+360)%360)/2;
    if(mid>=360) mid-=360;
    const ma=e2s(mid,asc);
    txt(svg,String(i+1),CX+Math.cos(ma)*Rhn,CY+Math.sin(ma)*Rhn,
      {fill:'#8070c0','font-size':11,'font-family':'serif','font-weight':'bold'});
  }

  // Aspect lines
  if(data.aspects){
    for(const asp of data.aspects){
      if(!data.planets[asp.p1]||!data.planets[asp.p2]) continue;
      const a1=e2s(data.planets[asp.p1].degree,asc);
      const a2=e2s(data.planets[asp.p2].degree,asc);
      const p1=pxy(a1,R4-2),p2=pxy(a2,R4-2);
      el('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,
        stroke:asp.color,'stroke-width':0.8,opacity:0.5},svg);
    }
  }

  // ── PLANETS ──
  const present=Object.keys(data.planets);
  const trueA={};
  for(const n of present) trueA[n]=e2s(data.planets[n].degree,asc);
  const sorted=[...present].sort((a,b)=>trueA[a]-trueA[b]);
  const dispA={};
  for(const n of present) dispA[n]=trueA[n];

  const Rg=R1+28;
  const MINGAP=(22+4)/Rg;

  for(let it=0;it<500;it++){
    let moved=false;
    for(let i=0;i<sorted.length;i++){
      for(let j=i+1;j<sorted.length;j++){
        const a=sorted[i],b=sorted[j];
        let d=dispA[b]-dispA[a];
        while(d>Math.PI) d-=2*Math.PI;
        while(d<-Math.PI) d+=2*Math.PI;
        if(Math.abs(d)<MINGAP&&Math.abs(d)>0.0001){
          const push=(MINGAP-Math.abs(d))/2;
          const dir=d>0?1:-1;
          dispA[a]-=push*dir; dispA[b]+=push*dir; moved=true;
        }
      }
    }
    if(!moved) break;
  }

  const ascAngle=Math.PI, mcAngle=e2s(data.mc,asc);
  for(let pass=0;pass<80;pass++){
    let moved=false;
    for(const n of present){
      for(const blocked of [ascAngle,mcAngle]){
        let d=dispA[n]-blocked;
        while(d>Math.PI) d-=2*Math.PI;
        while(d<-Math.PI) d+=2*Math.PI;
        if(Math.abs(d)<MINGAP&&Math.abs(d)>0.0001){
          dispA[n]=blocked+MINGAP*(d>0?1:-1); moved=true;
        }
      }
    }
    if(moved){
      for(let i=0;i<sorted.length;i++){
        for(let j=i+1;j<sorted.length;j++){
          const a=sorted[i],b=sorted[j];
          let d=dispA[b]-dispA[a];
          while(d>Math.PI) d-=2*Math.PI;
          while(d<-Math.PI) d+=2*Math.PI;
          if(Math.abs(d)<MINGAP&&Math.abs(d)>0.0001){
            const push=(MINGAP-Math.abs(d))/2;
            const dir=d>0?1:-1;
            dispA[a]-=push*dir; dispA[b]+=push*dir;
          }
        }
      }
    }
  }

  for(const name of present){
    const info=PI[name]||{sym:'?',color:'#ffffff'};
    const tA=trueA[name], color=info.color;
    let diff=dispA[name]-tA;
    while(diff>Math.PI) diff-=2*Math.PI;
    while(diff<-Math.PI) diff+=2*Math.PI;
    const wasMoved=Math.abs(diff)>0.015;
    const gxy=pxy(wasMoved?dispA[name]:tA,Rg);

    // tick at true position
    el('line',{x1:CX+Math.cos(tA)*(R1+1),y1:CY+Math.sin(tA)*(R1+1),
      x2:CX+Math.cos(tA)*(R1+10),y2:CY+Math.sin(tA)*(R1+10),
      stroke:color,'stroke-width':1.5},svg);
    el('circle',{cx:CX+Math.cos(tA)*(R1+1),cy:CY+Math.sin(tA)*(R1+1),r:2,fill:color},svg);

    if(wasMoved){
      el('line',{x1:CX+Math.cos(tA)*(R1+11),y1:CY+Math.sin(tA)*(R1+11),
        x2:gxy.x,y2:gxy.y,stroke:color,'stroke-width':0.6,opacity:0.5,'stroke-dasharray':'2 2'},svg);
    }

    // Sun gets special SVG
    if(name==='მზე'){
      const sunG=el('g',{transform:`translate(${gxy.x-13},${gxy.y-13})`},svg);
      // rays
      for(let i=0;i<8;i++){
        const ra=el('line',{x1:13,y1:3,x2:13,y2:7,stroke:'#f9c646','stroke-width':1.5,
          'stroke-linecap':'round',opacity:0.85,transform:`rotate(${i*45} 13 13)`},sunG);
      }
      // glow
      el('circle',{cx:13,cy:13,r:7,fill:'rgba(249,198,70,0.15)'},sunG);
      // core gradient
      const rg=el('radialGradient',{id:'sg2',cx:'38%',cy:'38%',r:'60%'},defs);
      el('stop',{offset:'0%','stop-color':'#fff7d0'},rg);
      el('stop',{offset:'45%','stop-color':'#f9c646'},rg);
      el('stop',{offset:'100%','stop-color':'#e8a020'},rg);
      el('circle',{cx:13,cy:13,r:5,fill:'url(#sg2)',filter:'url(#sunGlow)'},sunG);
    } else {
      txt(svg,info.sym,gxy.x,gxy.y,{fill:color,'font-size':22,'font-family':'serif'});
    }

    if(data.planets[name].retrograde){
      txt(svg,'℞',gxy.x+14,gxy.y-12,{fill:'#f87171','font-size':9});
    }
  }

  // ASC
  const ascA=e2s(asc,asc);
  el('line',{x1:CX+Math.cos(ascA)*(R1+1),y1:CY+Math.sin(ascA)*(R1+1),
    x2:CX+Math.cos(ascA)*(R1+16),y2:CY+Math.sin(ascA)*(R1+16),stroke:'#c084fc','stroke-width':2},svg);
  txt(svg,'ASC',CX+Math.cos(ascA)*(R1+30),CY+Math.sin(ascA)*(R1+30),
    {fill:'#c084fc','font-size':12,'font-weight':'bold','font-family':'sans-serif'});

  // MC
  const mcA=e2s(data.mc,asc);
  const mcDist=R1+46, mcCircR=20;
  const mcCX=CX+Math.cos(mcA)*mcDist, mcCY=CY+Math.sin(mcA)*mcDist;
  el('line',{x1:CX+Math.cos(mcA)*R1,y1:CY+Math.sin(mcA)*R1,
    x2:CX+Math.cos(mcA)*(mcDist-mcCircR-2),y2:CY+Math.sin(mcA)*(mcDist-mcCircR-2),
    stroke:'#c084fc','stroke-width':1.2,'marker-end':'url(#arr)'},svg);
  el('circle',{cx:mcCX,cy:mcCY,r:mcCircR,fill:'#0f0d2a',stroke:'#c084fc','stroke-width':1.2},svg);
  txt(svg,'MC',mcCX,mcCY,{fill:'#c084fc','font-size':12,'font-weight':'bold','font-family':'sans-serif'});
}

function drawPlanetTable(data){
  const tbody=document.getElementById('planet-tbody');
  tbody.innerHTML='';
  const shown=new Set();
  const order=[...PORDER,...Object.keys(data.planets).filter(k=>!PORDER.includes(k))];
  for(const name of order){
    if(!data.planets[name]||shown.has(name)) continue;
    shown.add(name);
    const info=PI[name]||{sym:'★',color:'#aaaaaa'};
    const d=data.planets[name];
    const si=SIGN_KA.indexOf(d.sign);
    const degStr=fmtDeg(d.degree);
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${name==='მზე'?sunIcon(info.color):`<span class="p-sym" style="color:${info.color}">${info.sym}</span>`}</td>
      <td style="color:${info.color};font-size:11px">${name}</td>
      <td class="deg-val">${degStr}</td>
      <td>${si>=0?ZSYM[si]:''} ${d.sign}</td>
      <td><span class="house-badge">${d.house||'?'}</span></td>
      <td>${d.retrograde?'<span class="retro">℞</span>':''}</td>`;
    tbody.appendChild(tr);
  }
}

function drawHouseTable(data){
  const tbody=document.getElementById('house-tbody');
  tbody.innerHTML='';
  const ROMAN=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
  const ANG={0:'ASC',3:'IC',6:'DSC',9:'MC'};
  for(let i=0;i<12;i++){
    const deg=data.houses[i];
    const si=Math.floor(deg/30)%12;
    const ang=ANG[i];
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="color:${ang?'#c084fc':'#9f8fd4'};font-weight:${ang?'bold':'normal'}">
        ${ROMAN[i]}${ang?' ('+ang+')':''}
      </td>
      <td>${ZSYM[si]||''} ${SIGN_KA[si]||''}</td>
      <td class="deg-val">${fmtDeg(deg)}</td>`;
    tbody.appendChild(tr);
  }
}

function drawAspectTable(data){
  const tbody=document.getElementById('aspect-tbody');
  tbody.innerHTML='';
  if(!data.aspects||!data.aspects.length){
    tbody.innerHTML='<tr><td colspan="5" style="color:#555;text-align:center;padding:8px">ასპექტები არ მოიძებნა</td></tr>';
    return;
  }
  for(const asp of data.aspects){
    const i1=PI[asp.p1]||{sym:'?',color:'#aaa'};
    const i2=PI[asp.p2]||{sym:'?',color:'#aaa'};
    const sym1=asp.p1==='მზე'?`<span style="font-size:14px">☉</span>`:`<span style="color:${i1.color};font-size:16px;font-family:serif">${i1.sym}</span>`;
    const sym2=asp.p2==='მზე'?`<span style="font-size:14px">☉</span>`:`<span style="color:${i2.color};font-size:16px;font-family:serif">${i2.sym}</span>`;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${sym1} <span style="font-size:11px;color:${i1.color}">${asp.p1}</span></td>
      <td><span class="asp-sym" style="color:${asp.color}">${asp.sym}</span></td>
      <td>${sym2} <span style="font-size:11px;color:${i2.color}">${asp.p2}</span></td>
      <td style="color:${asp.color};font-size:11px">${asp.type}</td>
      <td style="color:#7060b0;font-size:11px">${asp.orb}°</td>`;
    tbody.appendChild(tr);
  }
}
