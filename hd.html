<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8">
<title>ადამიანის დიზაინი — სხეულის გრაფიკა</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BPG+Arial&family=Noto+Serif+Georgian:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0c0a1a;
    --bg-card:   #16132b;
    --bg-raised: #1e1a3a;
    --gold:      #c49a6c;
    --gold-dim:  #8a6b4a;
    --ink:       #f4ede0;
    --ink-dim:   #b7ae9d;
    --design:    #662d91;
    --design-lt: #8b4fb8;
    --person:    #2e2a80;
    --person-lt: #5a55c4;
    --accent:    #d9b88a;
    --error:     #c45a5a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Noto Serif Georgian','BPG Arial','Manrope',sans-serif;font-weight:400;line-height:1.5;min-height:100vh}
  body{
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(102,45,145,.15), transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 100%, rgba(46,42,128,.18), transparent 60%),
      linear-gradient(180deg, #0c0a1a 0%, #0a081a 100%);
  }
  h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:500;letter-spacing:.01em;margin:0}
  a{color:var(--gold)}
  button{font-family:inherit}

  .page{max-width:1400px;margin:0 auto;padding:42px 32px 80px}

  header.top{
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:1px solid rgba(196,154,108,.25);padding-bottom:22px;margin-bottom:36px
  }
  header.top h1{font-size:2.4rem;font-style:italic}
  header.top h1 em{font-style:normal;color:var(--gold)}
  header.top .sub{color:var(--ink-dim);font-size:.85rem;letter-spacing:.22em;text-transform:uppercase}

  form.input-form{
    background:var(--bg-card);
    border:1px solid rgba(196,154,108,.2);
    padding:28px 32px;border-radius:4px;margin-bottom:40px;
    display:grid;grid-template-columns:repeat(4, 1fr);gap:20px;align-items:end;
    box-shadow:0 10px 40px -10px rgba(0,0,0,.6);
  }
  form label{display:block;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px}
  form input{
    width:100%;padding:12px 14px;background:var(--bg-raised);color:var(--ink);
    border:1px solid rgba(196,154,108,.2);border-radius:3px;font:inherit;font-size:.95rem;
    transition:border-color .15s, background .15s;
  }
  form input:focus{outline:none;border-color:var(--gold);background:#221e40}
  form button{
    padding:12px 22px;background:var(--gold);color:#1a1206;border:0;border-radius:3px;
    font-weight:600;letter-spacing:.12em;text-transform:uppercase;font-size:.82rem;cursor:pointer;
    transition:background .15s, transform .1s;
  }
  form button:hover{background:var(--accent)}
  form button:active{transform:translateY(1px)}
  form button:disabled{opacity:.5;cursor:wait}

  .status{font-size:.9rem;color:var(--ink-dim);margin-top:-20px;margin-bottom:30px;padding:0 6px}
  .status.error{color:var(--error)}

  .summary{
    display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:16px;margin-bottom:40px;
  }
  .card{
    background:var(--bg-card);border:1px solid rgba(196,154,108,.15);
    padding:22px 22px 18px;border-radius:3px;
    position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);opacity:.6}
  .card .k{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:10px}
  .card .v{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:500;color:var(--ink);line-height:1.2}
  .card .v.small{font-size:1.1rem}

  .chart-area{
    display:grid;grid-template-columns:200px 1fr 200px;gap:0;
    background:var(--bg-card);border:1px solid rgba(196,154,108,.15);border-radius:3px;
    padding:20px;margin-bottom:40px;align-items:start;
    min-height:640px;
  }
  .planet-col{padding:12px 8px;font-family:'JetBrains Mono',monospace;font-size:.78rem}
  .planet-col h3{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;font-style:italic;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid rgba(196,154,108,.25);text-align:center;letter-spacing:.1em}
  .planet-col.design h3{color:var(--design-lt)}
  .planet-col.personality h3{color:var(--person-lt)}
  .planet-col .row{display:grid;grid-template-columns:18px 1fr auto;gap:6px;padding:4px 2px;border-bottom:1px dotted rgba(196,154,108,.08)}
  .planet-col .row .g{font-family:'Cormorant Garamond',serif;font-size:1rem;text-align:center;color:var(--gold)}
  .planet-col .row .nm{color:var(--ink-dim);font-size:.72rem}
  .planet-col .row .gl{color:var(--ink);font-variant-numeric:tabular-nums}
  .planet-col .row .gl .gate{color:var(--ink);font-weight:600}
  .planet-col .row .gl .line{color:var(--gold-dim)}

  #bodygraph{
    position:relative;display:flex;align-items:center;justify-content:center;
  }
  #bodygraph svg{width:100%;height:auto;max-height:640px;display:block}
  #bodygraph svg circle.gate-circle{transition:fill .25s ease}

  .details{
    display:grid;grid-template-columns:1.3fr 1fr;gap:30px;
  }
  .panel{
    background:var(--bg-card);border:1px solid rgba(196,154,108,.15);
    padding:26px 28px;border-radius:3px;
  }
  .panel h2{font-size:1.5rem;font-style:italic;margin-bottom:18px;color:var(--accent)}
  .panel h2 small{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;font-style:normal;color:var(--ink-dim);margin-left:10px;vertical-align:middle;font-family:'Manrope',sans-serif}
  .channel-list{display:grid;grid-template-columns:1fr;gap:8px}
  .channel-item{
    display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
    padding:10px 14px;background:var(--bg-raised);border-left:3px solid var(--gold-dim);font-size:.9rem
  }
  .channel-item.design{border-left-color:var(--design-lt)}
  .channel-item.personality{border-left-color:var(--person-lt)}
  .channel-item.mixed{border-left-color:var(--gold)}
  .channel-item .pair{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--ink);font-weight:600;min-width:70px}
  .channel-item .name{color:var(--ink-dim);font-style:italic}
  .channel-item .tag{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}
  .channel-item.design .tag{color:var(--design-lt)}
  .channel-item.personality .tag{color:var(--person-lt)}

  .centers-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .center-chip{padding:10px 12px;background:var(--bg-raised);border:1px solid transparent;text-align:center;font-size:.85rem;color:var(--ink-dim)}
  .center-chip.defined{color:var(--ink);border-color:var(--gold);background:rgba(196,154,108,.08)}
  .center-chip.defined .dot{display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%;margin-right:8px;vertical-align:middle}

  .meta{font-size:.82rem;color:var(--ink-dim);line-height:1.8}
  .meta strong{color:var(--ink);font-weight:500}

  .loading{text-align:center;padding:60px 20px;color:var(--ink-dim);font-style:italic;letter-spacing:.1em}
  .hidden{display:none!important}

  @media (max-width:900px){
    form.input-form{grid-template-columns:1fr 1fr}
    .chart-area{grid-template-columns:1fr;padding:16px}
    .planet-col{order:2}
    #bodygraph{order:1}
    .details{grid-template-columns:1fr}
    .page{padding:24px 14px 40px}
    header.top{flex-direction:column;align-items:flex-start;gap:6px}
    header.top h1{font-size:1.8rem}
  }
</style>
</head>
<body>
<div class="page">

  <header class="top">
    <div>
      <h1>ადამიანის <em>დიზაინი</em></h1>
    </div>
  </header>

  <form class="input-form" id="birth-form">
    <div>
      <label for="date">დაბადების თარიღი</label>
      <input id="date" name="date" type="date" required value="1948-04-09">
    </div>
    <div>
      <label for="time">დაბადების დრო (ადგილობრივი)</label>
      <input id="time" name="time" type="time" required value="10:00">
    </div>
    <div style="grid-column:span 1">
      <label for="city">ქალაქი</label>
      <input id="city" name="city" type="text" placeholder="მაგ. თბილისი, London, Paris..." oninput="searchCity()">
      <div id="city-hint" style="font-size:.78rem;color:var(--person-lt);margin-top:5px;min-height:16px"></div>
    </div>
    <div>
      <button type="submit" id="submit-btn">გრაფიკის გამოთვლა</button>
    </div>
    <!-- hidden coord fields filled by searchCity() -->
    <input type="hidden" id="lat">
    <input type="hidden" id="lon">
    <input type="hidden" id="tz_name" value="UTC">
    <div style="grid-column:span 4;display:flex;gap:16px;margin-top:-8px;font-size:.78rem;color:var(--ink-dim)">
      <span id="coords-display"></span>
      <span id="tz-display"></span>
    </div>
  </form>

  <div class="status" id="status"></div>

  <section id="results" class="hidden">

    <div class="summary" id="summary-cards"></div>

    <div class="chart-area">
      <div class="planet-col design" id="col-design">
        <h3>დიზაინი</h3>
      </div>
      <div id="bodygraph">
        <div class="loading">იტვირთება სხეულის გრაფიკა…</div>
      </div>
      <div class="planet-col personality" id="col-personality">
        <h3>პიროვნება</h3>
      </div>
    </div>

    <div class="details">
      <div class="panel">
        <h2>არხები <small id="channel-count"></small></h2>
        <div class="channel-list" id="channel-list"></div>
      </div>
      <div class="panel">
        <h2>ცენტრები</h2>
        <div class="centers-list" id="centers-list"></div>
        <div class="meta" id="meta"></div>
      </div>
    </div>

  </section>

</div>

<script>
const API_BASE = "https://astrology-production-b165.up.railway.app";

const PLANET_ORDER = [
  "Sun","Earth","North Node","South Node","Moon",
  "Mercury","Venus","Mars","Jupiter","Saturn","Uranus","Neptune","Pluto"
];

const PLANET_GLYPH = {
  "Sun":"☉","Earth":"⊕","Moon":"☽","North Node":"☊","South Node":"☋",
  "Mercury":"☿","Venus":"♀","Mars":"♂","Jupiter":"♃","Saturn":"♄",
  "Uranus":"♅","Neptune":"♆","Pluto":"♇"
};

const PLANET_KA = {
  "Sun":"მზე","Earth":"დედამიწა","Moon":"მთვარე",
  "North Node":"ჩრდილო კვანძი","South Node":"სამხრეთი კვანძი",
  "Mercury":"მერკური","Venus":"ვენერა","Mars":"მარსი",
  "Jupiter":"იუპიტერი","Saturn":"სატურნი",
  "Uranus":"ურანი","Neptune":"ნეპტუნი","Pluto":"პლუტონი"
};

const CENTER_ORDER = ["Head","Ajna","Throat","G","Heart","Solar Plexus","Spleen","Sacral","Root"];
const CENTER_KA = {
  "Head":"გვირგვინოვანი","Ajna":"აჯნა","Throat":"ყელი","G":"G ცენტრი",
  "Heart":"გული","Solar Plexus":"მზის წნული","Spleen":"ელენთა",
  "Sacral":"საკრალური","Root":"ფუძისეული"
};

const TYPE_KA = {
  "Manifestor":"მანიფესტორი",
  "Generator":"გენერატორი",
  "Manifesting Generator":"მანიფესტანტი გენერატორი",
  "Projector":"პროექტორი",
  "Reflector":"რეფლექტორი"
};

const STRATEGY_KA = {
  "To Inform":"ინფორმირება",
  "To Respond":"პასუხი",
  "To Respond, then Inform":"პასუხი, შემდეგ ინფორმირება",
  "Wait for the Invitation":"მოლოდინში მოწვევისა",
  "Wait a Lunar Cycle (28 days)":"ელოდე მთვარის ციკლს (28 დღე)"
};

let gatePositions = null;
let svgDoc = null;

/* ---------------- city geocode (same as astro.html) ---------------- */
let _cityTimer = null;
function searchCity(){
  clearTimeout(_cityTimer);
  _cityTimer = setTimeout(async () => {
    const city = document.getElementById("city").value.trim();
    const hint = document.getElementById("city-hint");
    if (city.length < 2) { hint.textContent = ""; return; }
    hint.textContent = "⏳ ძიება…";
    try {
      const r = await fetch(API_BASE + "/geocode", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({city})
      });
      const raw = await r.text();
      let d;
      try { d = JSON.parse(raw); }
      catch(e) { hint.textContent = "❌ Server error (" + r.status + ")"; return; }
      if (d.error) { hint.textContent = "❌ " + d.error; return; }
      document.getElementById("lat").value     = d.lat;
      document.getElementById("lon").value     = d.lon;
      document.getElementById("tz_name").value = d.tz_name || "UTC";
      hint.textContent = "📍 " + d.display;
      document.getElementById("coords-display").textContent =
        d.lat.toFixed(4) + "°, " + d.lon.toFixed(4) + "°";
      document.getElementById("tz-display").textContent =
        "🕐 " + (d.tz_name || "UTC");
    } catch(e) {
      hint.textContent = "❌ " + e.message;
    }
  }, 600);
}

async function loadBodygraph(){
  const [svgText, posJson] = await Promise.all([
    fetch(API_BASE + "/static/human_prepared.svg").then(r => r.text()),
    fetch(API_BASE + "/static/gate_positions.json").then(r => r.json())
  ]);
  gatePositions = posJson;
  const wrap = document.getElementById("bodygraph");
  wrap.innerHTML = svgText;
  svgDoc = wrap.querySelector("svg");
  if (!svgDoc) throw new Error("SVG not found — check Railway logs.");
  svgDoc.setAttribute("preserveAspectRatio","xMidYMid meet");
  svgDoc.removeAttribute("width");
  svgDoc.removeAttribute("height");
  svgDoc.setAttribute("viewBox","480 80 500 660");
  const svgStyle = svgDoc.querySelector('#hd-activation');
  if (svgStyle) {
    const old = document.getElementById('hd-activation-doc');
    if (old) old.remove();
    const docStyle = document.createElement('style');
    docStyle.id = 'hd-activation-doc';
    docStyle.textContent = svgStyle.textContent;
    document.head.appendChild(docStyle);
    svgStyle.remove();
  }
  svgDoc.querySelectorAll(".detail-part").forEach(el => {
    el.style.setProperty('display', 'none', 'important');
  });
}

function clearActivations(){
  if(!svgDoc) return;
  // Clear gate/center activation classes from SVG root
  const toRemove = [];
  svgDoc.classList.forEach(c => {
    if (c.startsWith("active-p-") || c.startsWith("active-d-") ||
        c.startsWith("active-b-") || c.startsWith("detail-on-") ||
        c.startsWith("center-active-")) {
      toRemove.push(c);
    }
  });
  toRemove.forEach(c => svgDoc.classList.remove(c));
  // Directly hide ALL detail-part groups (bypass CSS specificity issues)
  svgDoc.querySelectorAll(".detail-part").forEach(el => {
    el.style.setProperty('display', 'none', 'important');
  });
}

function activateGate(gate, src){
  // Add color class to svg root (drives CSS for circles, texts, lines)
  // colorGateLines handles the 60 non-integration gates;
  // we handle circles/texts for ALL gates including 10,20,34,57 here.
  if (src) {
    let cls = null;
    if (src.p && src.d) cls = "active-b-" + gate;
    else if (src.p)    cls = "active-p-" + gate;
    else if (src.d)    cls = "active-d-" + gate;
    if (cls) svgDoc.classList.add(cls);
  }
}

function colorGateLines(gate, sourceFlags){
  if ([10, 20, 34, 57].includes(gate)) return;
  let cls = null;
  if (sourceFlags.p && sourceFlags.d) cls = "active-b-" + gate;
  else if (sourceFlags.p)              cls = "active-p-" + gate;
  else if (sourceFlags.d)              cls = "active-d-" + gate;
  if (cls) svgDoc.classList.add(cls);
}

function render(chart){
  window._chart = chart;
  clearActivations();
  console.log("Integration N:", chart.integration);

  Object.entries(chart.gate_sources).forEach(([g, src]) => {
    activateGate(parseInt(g, 10), src);
    colorGateLines(parseInt(g, 10), src);
  });

  chart.defined_centers.forEach(center => {
    const key = center.replace(/ /g, "");
    svgDoc.classList.add("center-active-" + key);
  });

  if (chart.integration && chart.integration.n) {
    // Directly show the correct detail group — bypasses CSS specificity issues
    // that arise when SVG is loaded via innerHTML
    const n = chart.integration.n;
    svgDoc.classList.add("detail-on-" + n);  // keep for CSS fallback
    const detEl = svgDoc.querySelector(`.detail-part[data-detail="${n}"]`);
    if (detEl) {
      detEl.style.setProperty('display', 'block', 'important');
    }
  }

  const integrationLabel = chart.integration
    ? `#${chart.integration.n}<small style="display:block;font-size:.68rem;color:var(--ink-dim);margin-top:4px;letter-spacing:.06em">10·${chart.integration.states["10"]}  57·${chart.integration.states["57"]}  34·${chart.integration.states["34"]}  20·${chart.integration.states["20"]}</small>`
    : "—";
  const cards = [
    {k:"ტიპი",            v: TYPE_KA[chart.type] || chart.type,                 small:false},
    {k:"სტრატეგია",       v: STRATEGY_KA[chart.strategy] || chart.strategy,     small:true},
    {k:"ავტორიტეტი",      v: chart.authority,                                   small:true},
    {k:"პროფილი",         v: chart.profile,                                     small:false},
    {k:"არარეალიზებული 'მე'", v: chart.not_self || "", small:true},
    {k:"რეალიზებული 'მე'", v: chart.signature || "", small:true},
    {k:"მთავარი ნიჭი", v: chart.sun_gift || "", small:true},
    {k:"განსაზღვრება", v: chart.definition || "", small:true},
    {k:"საკვები", v: chart.digestion || "", small:true},
    {k:"გრძნობა", v: chart.sense || "", small:true},
    {k:"გარემო", v: chart.environment || "", small:true},
    {k:"მოტივაცია", v: chart.motivation || "", small:true},
    {k:"პერსპექტივა", v: chart.perspective || "", small:true},
    {k:"სხვა საჩუქრები", v: (chart.other_gifts || []).join(", "), small:true},
    {k:"ინკარნაციის ჯვარი", v: TYPE_KA[chart.incarnation_cross] || chart.incarnation_cross,                  small:true}
  ];
  document.getElementById("summary-cards").innerHTML =
    cards.map(c => `<div class="card"><div class="k">${c.k}</div><div class="v${c.small?' small':''}">${c.v}</div></div>`).join("");

  const planetRow = (a, tag) => {
    const glyph = PLANET_GLYPH[a.planet] || "";
    const name  = PLANET_KA[a.planet] || a.planet;
    return `<div class="row ${tag}">
      <span class="g">${glyph}</span>
      <span class="nm">${name}</span>
      <span class="gl"><span class="gate">${a.gate}</span>.<span class="line">${a.line}</span></span>
    </div>`;
  };
  const ordered = list => PLANET_ORDER.map(p => list.find(x => x.planet === p)).filter(Boolean);
  document.getElementById("col-design").innerHTML =
    `<h3>დიზაინი</h3>` + ordered(chart.design).map(a => planetRow(a,"d")).join("");
  document.getElementById("col-personality").innerHTML =
    `<h3>პიროვნება</h3>` + ordered(chart.personality).map(a => planetRow(a,"p")).join("");

  const chanHtml = chart.defined_channels.map(c =>
    `<div class="channel-item ${c.type}">
       <span class="pair">${c.gate_a}–${c.gate_b}</span>
       <span class="name">${c.name}</span>
       <span class="tag">${c.type}</span>
     </div>`
  ).join("");
  document.getElementById("channel-count").textContent = `${chart.defined_channels.length} განსაზღვრული`;
  document.getElementById("channel-list").innerHTML = chanHtml ||
    `<div class="meta" style="font-style:italic">არხები განსაზღვრული არ არის.</div>`;

  const defCenters = new Set(chart.defined_centers);
  document.getElementById("centers-list").innerHTML = CENTER_ORDER.map(c =>
    `<div class="center-chip ${defCenters.has(c)?'defined':''}">${defCenters.has(c)?'<span class="dot"></span>':''}${CENTER_KA[c] || c}</div>`
  ).join("");

  const inp = chart.input;
  document.getElementById("meta").innerHTML = `
    <div><strong>დაბადება:</strong> ${inp.date} ${inp.time} — ${inp.resolved_place}</div>
    <div><strong>კოორდინატები:</strong> ${inp.lat.toFixed(4)}°, ${inp.lon.toFixed(4)}° — ${inp.tz}</div>
    <div><strong>UTC დრო:</strong> ${inp.utc_time}</div>
    <div><strong>დიზაინის დრო:</strong> ${chart.design_time_utc}</div>
  `;

  document.getElementById("results").classList.remove("hidden");
}

document.getElementById("birth-form").addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const btn = document.getElementById("submit-btn");
  const stat = document.getElementById("status");

  const lat     = document.getElementById("lat").value;
  const lon     = document.getElementById("lon").value;
  const tz_name = document.getElementById("tz_name").value;
  const city    = document.getElementById("city").value.trim();

  if (!lat || !lon) {
    stat.className = "status error";
    stat.textContent = "⚠ პირველ შეიყვანეთ ქალაქი და დაელოდეთ 📍 ნიშანს";
    return;
  }

  stat.className = "status";
  stat.textContent = "იტვირთება…";
  btn.disabled = true;
  try{
    if(!svgDoc) await loadBodygraph();
    const body = {
      date:     document.getElementById("date").value,
      time:     document.getElementById("time").value,
      lat:      parseFloat(lat),
      lon:      parseFloat(lon),
      tz_name:  tz_name,
      place:    city,
    };
    const r = await fetch(API_BASE + "/api/hd_chart", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });

    const raw = await r.text();
    let chart;
    try { chart = JSON.parse(raw); }
    catch(_) {
      throw new Error(
        "Backend returned HTTP " + r.status + " (HTML instead of JSON). " +
        "Check Railway logs."
      );
    }

    if(!r.ok) throw new Error(chart.error || "HTTP " + r.status);
    render(chart);
    stat.textContent = "";
  } catch(e){
    stat.className = "status error";
    stat.textContent = "შეცდომა: " + e.message;
  } finally {
    btn.disabled = false;
  }
});

loadBodygraph().catch(e => {
  document.getElementById("bodygraph").innerHTML =
    `<div class="loading" style="color:var(--error)">Could not load body graph: ${e.message}</div>`;
});
</script>
</body>
</html>
