<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8">
<title>ადამიანის დიზაინი</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600&family=Noto+Serif+Georgian:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --void:#04030a;--deep:#07050f;--surface:#0e0b1c;--raised:#161228;--card:#120f22;
  --border:rgba(160,120,70,.15);--border-h:rgba(200,160,90,.45);
  --gold:#c49550;--gold-lt:#e8c47a;--gold-dim:#7a5c28;--gold-glow:rgba(196,149,80,.12);
  --ink:#f0e8d8;--ink-mid:#a8998a;--ink-dim:#584e44;
  --violet:#6d28d9;--violet-lt:#a78bfa;--indigo-lt:#818cf8;
  --red:#c0392b;--red-lt:#f87171;--red-dim:#7a2828;
  --r:4px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--void);color:var(--ink);
  font-family:'Noto Serif Georgian',serif;font-weight:400;line-height:1.6;font-size:15px;}
body{background:
  radial-gradient(ellipse 100% 60% at 50% -5%,rgba(109,40,217,.1),transparent 55%),
  radial-gradient(ellipse 70% 50% at 5% 50%,rgba(109,40,217,.06),transparent 50%),
  radial-gradient(ellipse 60% 70% at 95% 90%,rgba(196,149,80,.05),transparent 50%),
  var(--void);}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.4),transparent),
    radial-gradient(1px 1px at 80% 10%,rgba(255,255,255,.3),transparent),
    radial-gradient(1px 1px at 45% 75%,rgba(255,255,255,.25),transparent),
    radial-gradient(1.5px 1.5px at 60% 30%,rgba(255,255,255,.3),transparent),
    radial-gradient(2px 2px at 35% 50%,rgba(196,149,80,.25),transparent);}
body::after{content:"";position:fixed;top:-20%;left:50%;transform:translateX(-50%);
  width:800px;height:400px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(196,149,80,.06) 0%,transparent 70%);
  pointer-events:none;z-index:0;}

.page{position:relative;z-index:1;max-width:1700px;margin:0 auto;padding:44px 36px 100px;}

/* ── HEADER ── */
header{text-align:center;padding-bottom:20px;margin-bottom:16px;position:relative;}
header::before{content:"✦  ✦  ✦";display:block;font-size:.65rem;letter-spacing:.5em;color:var(--gold-dim);margin-bottom:14px;}
.brand{font-family:'Cinzel Decorative',serif;font-size:2.2rem;font-weight:400;letter-spacing:.08em;
  background:linear-gradient(180deg,var(--gold-lt) 0%,var(--gold) 50%,var(--gold-dim) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.2;margin-bottom:8px;}
.brand-sub{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.5em;text-transform:uppercase;color:var(--ink-dim);}
header::after{content:"";display:block;width:280px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:16px auto 0;}

/* ── TAB BAR ── */
.tab-bar{display:flex;justify-content:center;gap:6px;margin-bottom:20px;}
.tab-btn{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(167,139,250,.55);background:rgba(8,6,20,.6);
  border:1px solid rgba(45,31,110,.4);border-radius:20px;padding:8px 28px;cursor:pointer;
  transition:all .25s;}
.tab-btn:hover{color:var(--violet-lt);border-color:rgba(100,65,200,.6);}
.tab-btn.active{color:#fff;background:linear-gradient(135deg,rgba(109,40,217,.7),rgba(76,29,149,.7));
  border-color:rgba(124,58,237,.5);box-shadow:0 2px 12px rgba(109,40,217,.3);}

/* ── FORM SHELL ── */
.form-shell{max-width:820px;margin:0 auto 20px;
  background:rgba(8,6,20,.75);border:1px solid rgba(45,31,110,.6);
  border-radius:16px;padding:24px;backdrop-filter:blur(12px);
  box-shadow:0 8px 40px rgba(0,0,0,.5);position:relative;}
.form-shell::before{content:"";position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(167,139,250,.4),transparent);}
.form-section{display:none;}
.form-section.active{display:block;}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.person-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);opacity:.7;margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid rgba(201,168,76,.15);}
.person-label.red{color:var(--red-lt);opacity:.9;
  border-bottom-color:rgba(192,57,43,.2);}
.person-sep{height:1px;background:rgba(45,31,110,.4);margin:14px 0;}
.field label{display:block;font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);opacity:.7;margin-bottom:5px;font-family:'Cinzel',serif;}
.field input{width:100%;padding:9px 12px;background:rgba(10,8,30,.7);color:var(--ink);
  border:1px solid rgba(61,42,138,.6);border-radius:8px;font:inherit;font-size:13px;
  transition:border-color .2s,box-shadow .2s;outline:none;}
.field input:focus{border-color:var(--violet-lt);box-shadow:0 0 0 3px rgba(124,58,237,.15);}
.field input::placeholder{color:rgba(155,168,184,.35);}
.city-hint{font-size:11px;color:var(--indigo-lt);margin-top:3px;min-height:14px;}
.tz-row{font-size:11px;color:rgba(167,139,250,.6);min-height:16px;margin-bottom:6px;}
.btn-calc{width:100%;background:linear-gradient(135deg,#6d28d9,#4c1d95);color:#fff;
  border:1px solid rgba(124,58,237,.4);border-radius:10px;padding:13px;font-size:13px;
  cursor:pointer;letter-spacing:2px;font-family:'Cinzel',serif;transition:all .3s;
  box-shadow:0 4px 20px rgba(109,40,217,.3);margin-top:8px;}
.btn-calc:hover{background:linear-gradient(135deg,#7c3aed,#5b21b6);transform:translateY(-1px);}
.btn-calc:disabled{opacity:.4;cursor:wait;transform:none;}
.status{font-size:.83rem;color:var(--ink-dim);margin-bottom:8px;text-align:center;min-height:16px;}
.status.error{color:#e06060;}
.hidden{display:none!important}

/* ── SEC HEAD ── */
.sec-head{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.sec-head span{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--gold-dim);white-space:nowrap;}
.sec-head::before{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border));}
.sec-head::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

/* ── NATAL: bodygraph | cards | gifts ── */
.main-layout{display:grid;grid-template-columns:1fr 440px 240px;gap:10px;margin-bottom:20px;align-items:stretch;}
.left-col{display:flex;flex-direction:column;}
.right-col{display:flex;flex-direction:column;}
.gifts-col{display:flex;flex-direction:column;}

/* ── SYNASTRY LAYOUT: p2-d | p2-p | [chart: p1-d | svg | p1-p] ── */
.syn-layout{display:grid;grid-template-columns:140px 140px 1fr;gap:10px;margin-bottom:20px;align-items:start;}

/* ── CHART AREA ── */
.chart-area{flex:1;display:grid;grid-template-columns:110px 1fr 110px;
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  padding:16px;align-items:start;position:relative;overflow:hidden;}
.chart-area::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim) 30%,var(--gold) 50%,var(--gold-dim) 70%,transparent);}

/* ── PLANET COLS ── */
.planet-col{padding:4px 0;font-family:'JetBrains Mono',monospace;font-size:.6rem;}
.planet-col h3{font-family:'Cinzel',serif;font-size:.5rem;font-weight:500;letter-spacing:.18em;
  text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid var(--border);text-align:center;}
.planet-col.design h3{color:var(--violet-lt);}
.planet-col.personality h3{color:var(--indigo-lt);}
/* standalone col boxes for P2 */
.pcol-box{background:var(--surface);border:1px solid rgba(192,57,43,.2);border-radius:6px;
  padding:12px 8px;font-family:'JetBrains Mono',monospace;font-size:.6rem;}
.pcol-box h3{font-family:'Cinzel',serif;font-size:.48rem;font-weight:500;letter-spacing:.15em;
  text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid rgba(192,57,43,.2);text-align:center;}
.pcol-box.p2d h3{color:var(--red-lt);}
.pcol-box.p2p h3{color:#f8a0a0;}

.prow{display:grid;grid-template-columns:14px 1fr auto;gap:3px;align-items:center;
  padding:3px 1px;border-bottom:1px solid rgba(255,255,255,.02);}
.prow:hover{background:rgba(255,255,255,.02);border-radius:2px;}
.prow .g{font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--gold-dim);text-align:center;}
.prow.red2 .g{color:var(--red-dim);}
.prow .nm{color:var(--ink-dim);font-size:.56rem;}
.prow.red2 .nm{color:#c08080;}
.prow .gl{font-variant-numeric:tabular-nums;font-size:.68rem;}
.prow .gl .gate{color:var(--ink);}
.prow.red2 .gl .gate{color:var(--red-lt);}
.prow .gl .line{color:var(--gold-dim);}
.prow.red2 .gl .line{color:var(--red-dim);}

#bodygraph,#bodygraph-syn{display:flex;align-items:center;justify-content:center;}
#bodygraph svg,#bodygraph-syn svg{width:100%;height:auto;max-height:780px;display:block;}

/* ── CARDS ── */
.summary{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;grid-auto-rows:1fr;align-content:start;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 16px 16px;position:relative;overflow:hidden;
  transition:border-color .25s,transform .2s,box-shadow .25s;cursor:default;display:flex;flex-direction:column;}
.card::before{content:"";position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);transition:left .3s,right .3s;}
.card:hover{border-color:var(--border-h);transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(0,0,0,.4),0 0 14px var(--gold-glow);}
.card:hover::before{left:5%;right:5%;}
.card.hi{border-color:rgba(196,149,80,.3);}
.card.hi::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.card .k{font-size:.56rem;letter-spacing:.25em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px;font-family:'Cinzel',serif;}
.card .v{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:400;color:var(--ink);line-height:1.35;}
.card .v.sm{font-size:1rem;}
.card .v.xs{font-size:.85rem;font-family:'Noto Serif Georgian',serif;line-height:1.5;}

/* ── GIFTS ── */
.gifts-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 14px;position:relative;overflow-y:auto;}
.gifts-card::before{content:"";position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.gift-item{font-size:.82rem;font-family:'Noto Serif Georgian',serif;color:var(--ink);padding:6px 0;border-bottom:1px solid rgba(180,140,90,.08);line-height:1.4;}
.gift-item:last-child{border-bottom:none;}

/* ── PANELS ── */
.details-wrap{display:grid;grid-template-columns:1fr calc(440px + 10px + 240px);gap:10px;}
.details{display:contents;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:22px 24px;position:relative;overflow:hidden;}
.panel::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);}
.panel h2{font-family:'Cinzel',serif;font-size:.65rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.panel h2 small{font-size:.52rem;color:var(--ink-dim);font-weight:400;}

/* ── CHANNELS ── */
.channel-list{display:flex;flex-direction:column;gap:5px;}
.ch-item{display:grid;grid-template-columns:64px 1fr auto;gap:8px;align-items:center;
  padding:7px 10px;background:var(--raised);border-left:2px solid var(--border);
  border-radius:0 var(--r) var(--r) 0;}
.ch-item.design{border-left-color:var(--violet);}
.ch-item.personality{border-left-color:var(--indigo-lt);}
.ch-item.mixed{border-left-color:var(--gold-dim);}
.ch-item.p2ch{border-left-color:var(--red);background:rgba(192,57,43,.05);}
.ch-item.electromagnetic{
  border-left-color:#ffd700;
  background:linear-gradient(90deg,rgba(255,215,0,.07),rgba(109,40,217,.07));
  box-shadow:0 0 10px rgba(255,215,0,.12);
  animation:empulse 2.2s ease-in-out infinite;
}
@keyframes empulse{
  0%,100%{box-shadow:0 0 8px rgba(255,215,0,.12),inset 0 0 0 transparent;}
  50%{box-shadow:0 0 20px rgba(255,215,0,.3),0 0 40px rgba(109,40,217,.15);}
}
.ch-item .pair{font-family:'Cormorant Garamond',serif;font-size:.92rem;color:var(--ink);font-weight:500;}
.ch-item.p2ch .pair{color:var(--red-lt);}
.ch-item.electromagnetic .pair{color:#ffd700;}
.ch-item .cname{color:var(--ink-mid);font-style:italic;font-size:.73rem;}
.ch-item.p2ch .cname{color:#c08080;}
.ch-item.electromagnetic .cname{color:#e8d080;}
.ch-item .ctag{font-size:.46rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);font-family:'Cinzel',serif;}
.ch-item.design .ctag{color:var(--violet-lt);}
.ch-item.personality .ctag{color:var(--indigo-lt);}
.ch-item.mixed .ctag{color:var(--gold);}
.ch-item.p2ch .ctag{color:var(--red-lt);}
.ch-item.electromagnetic .ctag{color:#ffd700;}
.ch-divider{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;
  padding:8px 0 5px;margin-top:4px;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:2px;}

/* ── CENTERS ── */
.centers-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;}
.center-chip{padding:7px 8px;text-align:center;background:var(--raised);border:1px solid transparent;border-radius:var(--r);font-size:.68rem;color:var(--ink-dim);transition:all .2s;}
.center-chip.on{color:var(--ink);border-color:rgba(196,149,80,.25);background:rgba(196,149,80,.05);}
.center-chip.on::before{content:"◆ ";color:var(--gold);font-size:.4rem;vertical-align:middle;}
.meta-info{font-size:.68rem;color:var(--ink-dim);line-height:2;}
.meta-info strong{color:var(--ink-mid);}
.loading{text-align:center;padding:60px 20px;color:var(--ink-dim);font-style:italic;letter-spacing:.1em;font-size:.85rem;}

/* ── LEGEND ── */
.legend{display:flex;gap:18px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

@media(max-width:1300px){.main-layout{grid-template-columns:1fr 380px 180px;}
  .syn-layout{grid-template-columns:120px 120px 1fr;}}
@media(max-width:1000px){
  .main-layout,.syn-layout{grid-template-columns:1fr;}
  .summary{grid-template-columns:repeat(3,1fr);}
  .chart-area{grid-template-columns:1fr;}
  .planet-col{order:2;}#bodygraph,#bodygraph-syn{order:1;}
  .page{padding:28px 16px 60px;}}
@media(max-width:700px){.summary{grid-template-columns:repeat(2,1fr);}.brand{font-size:1.5rem;}}
</style>
</head>
<body>
<div class="page">

<header>
  <div class="brand">ადამიანის დიზაინი</div>
  <div class="brand-sub">Human Design Chart System</div>
</header>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="setMode('natal')">ნატალური</button>
  <button class="tab-btn" onclick="setMode('synastry')">სინასტრია</button>
</div>

<!-- FORMS -->
<div class="form-shell">

  <!-- NATAL -->
  <div id="form-natal" class="form-section active">
    <div class="form-row">
      <div class="field"><label>დღე</label><input type="number" id="n-day" value="9" min="1" max="31"></div>
      <div class="field"><label>თვე</label><input type="number" id="n-month" value="4" min="1" max="12"></div>
      <div class="field"><label>წელი</label><input type="number" id="n-year" value="1948"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>საათი</label><input type="number" id="n-hour" value="10" min="0" max="23"></div>
      <div class="field"><label>წუთი</label><input type="number" id="n-minute" value="0" min="0" max="59"></div>
      <div class="field"><label>წამი</label><input type="number" id="n-second" value="0" min="0" max="59"></div>
    </div>
    <div class="field" style="margin-bottom:6px">
      <label>ქალაქი</label>
      <input id="n-city" type="text" placeholder="თბილისი, London, Paris…" oninput="searchCity('n')">
      <div class="city-hint" id="n-city-hint"></div>
    </div>
    <div class="tz-row" id="n-tz-row"></div>
    <input type="hidden" id="n-lat"><input type="hidden" id="n-lon"><input type="hidden" id="n-tz" value="UTC">
    <button type="button" class="btn-calc" onclick="generate()">✦ გრაფიკის გამოთვლა ✦</button>
  </div>

  <!-- SYNASTRY -->
  <div id="form-synastry" class="form-section">
    <div class="person-label">👤 პირველი პირი</div>
    <div class="form-row">
      <div class="field"><label>დღე</label><input type="number" id="s1-day" value="1" min="1" max="31"></div>
      <div class="field"><label>თვე</label><input type="number" id="s1-month" value="1" min="1" max="12"></div>
      <div class="field"><label>წელი</label><input type="number" id="s1-year" value="1990"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>საათი</label><input type="number" id="s1-hour" value="12" min="0" max="23"></div>
      <div class="field"><label>წუთი</label><input type="number" id="s1-minute" value="0" min="0" max="59"></div>
      <div class="field"><label>წამი</label><input type="number" id="s1-second" value="0" min="0" max="59"></div>
    </div>
    <div class="field" style="margin-bottom:6px">
      <label>ქალაქი</label>
      <input id="s1-city" type="text" placeholder="ქალაქი" oninput="searchCity('s1')">
      <div class="city-hint" id="s1-city-hint"></div>
    </div>
    <div class="tz-row" id="s1-tz-row"></div>
    <input type="hidden" id="s1-lat"><input type="hidden" id="s1-lon"><input type="hidden" id="s1-tz" value="UTC">

    <div class="person-sep"></div>
    <div class="person-label red">👤 მეორე პირი</div>
    <div class="form-row">
      <div class="field"><label>დღე</label><input type="number" id="s2-day" value="1" min="1" max="31"></div>
      <div class="field"><label>თვე</label><input type="number" id="s2-month" value="1" min="1" max="12"></div>
      <div class="field"><label>წელი</label><input type="number" id="s2-year" value="1992"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>საათი</label><input type="number" id="s2-hour" value="12" min="0" max="23"></div>
      <div class="field"><label>წუთი</label><input type="number" id="s2-minute" value="0" min="0" max="59"></div>
      <div class="field"><label>წამი</label><input type="number" id="s2-second" value="0" min="0" max="59"></div>
    </div>
    <div class="field" style="margin-bottom:6px">
      <label>ქალაქი</label>
      <input id="s2-city" type="text" placeholder="ქალაქი" oninput="searchCity('s2')">
      <div class="city-hint" id="s2-city-hint"></div>
    </div>
    <div class="tz-row" id="s2-tz-row"></div>
    <input type="hidden" id="s2-lat"><input type="hidden" id="s2-lon"><input type="hidden" id="s2-tz" value="UTC">
    <button type="button" class="btn-calc" onclick="generate()">✦ სინასტრიის გამოთვლა ✦</button>
  </div>

</div>

<div class="status" id="status"></div>

<!-- ══ NATAL RESULTS ══ -->
<section id="results-natal" class="hidden">
  <div class="main-layout">
    <div class="left-col">

let currentMode='natal';

const cityTimers={};

// ── MODE ──
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['natal','synastry'][i]===mode));
  document.querySelectorAll('.form-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('form-'+mode).classList.add('active');
  document.getElementById('results-natal').classList.add('hidden');
  document.getElementById('results-synastry').classList.add('hidden');
  document.getElementById('status').textContent='';
}

// ── GEOCODE ──
function searchCity(prefix){
  clearTimeout(cityTimers[prefix]);
  cityTimers[prefix]=setTimeout(async()=>{
    const cityEl=document.getElementById(prefix+'-city');
    if(!cityEl)return;
    const city=cityEl.value.trim();
    const hint=document.getElementById(prefix+'-city-hint');
    if(city.length<2){hint.textContent='';return;}
    hint.textContent='⏳ ძიება…';
    try{
      const r=await fetch(API_BASE+'/geocode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({city})});
      const d=await r.json();
      if(d.error){hint.textContent='❌ '+d.error;return;}
      document.getElementById(prefix+'-lat').value=d.lat;
      document.getElementById(prefix+'-lon').value=d.lon;
      document.getElementById(prefix+'-tz').value=d.tz_name||'UTC';
      hint.textContent='📍 '+d.display;
      const tzRow=document.getElementById(prefix+'-tz-row');
      if(tzRow)tzRow.textContent='🕐 '+d.tz_name;
    }catch(e){hint.textContent='❌ '+e.message;}
  },600);
}

// ── FETCH HD ──
function getPerson(prefix){
  const d=n=>+document.getElementById(prefix+'-'+n).value;
  const s=n=>document.getElementById(prefix+'-'+n).value;
  const day=String(d('day')).padStart(2,'0'),month=String(d('month')).padStart(2,'0');
  const h=String(d('hour')).padStart(2,'0'),min=String(d('minute')).padStart(2,'0');
  return{date:`${d('year')}-${month}-${day}`,time:`${h}:${min}`,
    lat:+s('lat'),lon:+s('lon'),tz_name:s('tz')||'UTC'};
}
async function fetchHD(p){
  const r=await fetch(API_BASE+'/api/hd_chart',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({date:p.date,time:p.time,lat:p.lat,lon:p.lon,tz_name:p.tz_name,place:''})});
  const raw=await r.text();
  let d;try{d=JSON.parse(raw);}catch(_){throw new Error('Backend error '+r.status);}
  if(!r.ok)throw new Error(d.error||'HTTP '+r.status);
  return d;
}

// ── MAIN GENERATE ──
async function generate(){
  const stat=document.getElementById('status');
  const btn=document.querySelector('.form-section.active .btn-calc');
  if(btn){btn.disabled=true;btn.textContent='⏳ იტვირთება...';}
  stat.className='status';stat.textContent='იტვირთება…';
  try{
    if(currentMode==='natal'){
      const p=getPerson('n');
      if(!p.lat||!p.lon){stat.className='status error';stat.textContent='⚠ შეიყვანეთ ქალაქი';return;}
      if(!svgNatal)await loadSVG('bodygraph','natal');
      const chart=await fetchHD(p);
      renderNatal(chart);
      stat.textContent='';
    }else{
      const p1=getPerson('s1'),p2=getPerson('s2');
      if(!p1.lat||!p1.lon||!p2.lat||!p2.lon){stat.className='status error';stat.textContent='⚠ შეიყვანეთ ორივე ქალაქი';return;}
      if(!svgSyn)await loadSVG('bodygraph-syn','syn');
      const[c1,c2]=await Promise.all([fetchHD(p1),fetchHD(p2)]);
      renderSynastry(c1,c2);
      stat.textContent='';
    }
  }catch(e){stat.className='status error';stat.textContent='შეცდომა: '+e.message;}
  finally{
    if(btn){btn.disabled=false;
      btn.textContent=currentMode==='natal'?'✦ გრაფიკის გამოთვლა ✦':'✦ სინასტრიის გამოთვლა ✦';}
  }
}

// ── LOAD SVG ──
async function loadSVG(containerId,which){
  const svgText=await fetch(API_BASE+'/static/human_prepared.svg').then(r=>r.text());
  const wrap=document.getElementById(containerId);
  const parser=new DOMParser();
  const imported=document.importNode(parser.parseFromString(svgText,'image/svg+xml').documentElement,true);
  wrap.innerHTML='';wrap.appendChild(imported);
  const sv=wrap.querySelector('svg');
  if(!sv)throw new Error('SVG not found');
  sv.setAttribute('preserveAspectRatio','xMidYMid meet');
  sv.removeAttribute('width');sv.removeAttribute('height');
  sv.setAttribute('viewBox','420 40 580 780');
  const ss=sv.querySelector('#hd-activation');
  if(ss){
    const sid='hd-act-'+which;
    const old=document.getElementById(sid);if(old)old.remove();
    const ds=document.createElement('style');ds.id=sid;ds.textContent=ss.textContent;
    document.head.appendChild(ds);ss.remove();
  }
  sv.querySelectorAll('.detail-part').forEach(e=>e.style.setProperty('display','none','important'));
  if(which==='natal')svgNatal=sv;else svgSyn=sv;
}

// ── CLEAR ──
function clearSVG(sv){
  if(!sv)return;
  const tr=[];
  sv.classList.forEach(c=>{
    if(c.startsWith('active-')||c.startsWith('detail-on-')||c.startsWith('center-active-'))tr.push(c);
  });
  tr.forEach(c=>sv.classList.remove(c));
  sv.querySelectorAll('.detail-part').forEach(e=>e.style.setProperty('display','none','important'));
}

// ── SYNASTRY RENDER ──
function renderSynastry(c1,c2){
  clearSVG(svgSyn);

  const p1Gates=new Set(Object.keys(c1.gate_sources).map(Number));
  const p2Gates=new Set(Object.keys(c2.gate_sources).map(Number));

  // Activate P1 gates (normal colors)
  Object.entries(c1.gate_sources).forEach(([g,src])=>{
    const gi=parseInt(g,10);
    let cls=src.p&&src.d?'active-b-':src.p?'active-p-':src.d?'active-d-':null;
    if(cls)svgSyn.classList.add(cls+gi);
  });

  // Activate P2 gates — inject red style override
  injectP2RedStyle();
  Object.keys(c2.gate_sources).forEach(g=>{
    svgSyn.classList.add('active-p2-'+parseInt(g,10));
  });

  // Centers from P1
  c1.defined_centers.forEach(c=>svgSyn.classList.add('center-active-'+c.replace(/ /g,'')));

  // Synastry integration: 256-combination lookup for gates 10, 57, 34, 20
  // state: 0=neither, 1=p1, 2=p2, 3=both
  // detail index = s10*64 + s57*16 + s34*4 + s20 + 1
  {
    const gs=g=>{const h1=p1Gates.has(g),h2=p2Gates.has(g);return h1&&h2?3:h1?1:h2?2:0;};
    const synDetail=gs(10)*64+gs(57)*16+gs(34)*4+gs(20)+1;
    svgSyn.classList.add('detail-on-'+synDetail);
    const dEl=svgSyn.querySelector(`.detail-part[data-detail="${synDetail}"]`);
    if(dEl)dEl.style.setProperty('display','block','important');
  }

  // Planet cols
  fillPlanetCol(c1.design,c1.personality,'syn-p1-design','syn-p1-personality',false);
  fillPlanetColBox(c2.design,c2.personality,'syn-p2-design','syn-p2-personality');

  // Find electromagnetic channels
  const emChannels=[];
  for(const[ga,gb,name] of CHANNELS){
    const p1a=p1Gates.has(ga),p1b=p1Gates.has(gb);
    const p2a=p2Gates.has(ga),p2b=p2Gates.has(gb);
    // EM: p1 has one gate, p2 has the other (neither completes the channel alone)
    if((p1a&&!p1b&&p2b&&!p2a)||(p1b&&!p1a&&p2a&&!p2b)){
      emChannels.push({ga,gb,name});
    }
  }

  // Build channel HTML
  let html='';
  const TKA={design:'I დიზაინი',personality:'I პიროვნება',mixed:'I შერეული'};

  if(emChannels.length){
    html+=`<div class="ch-divider" style="color:#ffd700;opacity:.8">⚡ ელექტრომაგნეტური კავშირები — ${emChannels.length}</div>`;
    emChannels.forEach(c=>{
      html+=`<div class="ch-item electromagnetic">
        <span class="pair">${c.ga}–${c.gb}</span>
        <span class="cname">${c.name}</span>
        <span class="ctag">⚡ EM</span>
      </div>`;
    });
  }

  if(c1.defined_channels.length){
    html+=`<div class="ch-divider" style="color:var(--violet-lt);opacity:.7">პირველი პირი — ${c1.defined_channels.length} არხი</div>`;
    c1.defined_channels.forEach(c=>{
      html+=`<div class="ch-item ${c.type}">
        <span class="pair">${c.gate_a}–${c.gate_b}</span>
        <span class="cname">${c.name}</span>
        <span class="ctag">${TKA[c.type]||c.type}</span>
      </div>`;
    });
  }

  if(c2.defined_channels.length){
    html+=`<div class="ch-divider" style="color:var(--red-lt);opacity:.7">მეორე პირი — ${c2.defined_channels.length} არხი</div>`;
    c2.defined_channels.forEach(c=>{
      html+=`<div class="ch-item p2ch">
        <span class="pair">${c.gate_a}–${c.gate_b}</span>
        <span class="cname">${c.name}</span>
        <span class="ctag">II</span>
      </div>`;
    });
  }

  if(!html)html='<div style="color:var(--ink-dim);font-style:italic;font-size:.8rem">—</div>';

  const total=emChannels.length+c1.defined_channels.length+c2.defined_channels.length;
  document.getElementById('syn-channel-count').textContent=`⚡${emChannels.length} EM · ${total} სულ`;
  document.getElementById('syn-channel-list').innerHTML=html;

  document.getElementById('results-synastry').classList.remove('hidden');
  document.getElementById('results-natal').classList.add('hidden');
  document.getElementById('results-synastry').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── INJECT P2 RED CSS ──
function injectP2RedStyle(){
  if(document.getElementById('p2-red-style'))return;
  // We override gate colors for P2 by targeting active-p2-N classes on the SVG root
  // The SVG's internal CSS uses active-p-N / active-d-N for normal colors
  // For P2, we just need a different visual signal — tint the channel lines red
  // Since we can't easily target internal SVG elements via external CSS for each gate,
  // we use a CSS filter approach on p2-activated gates via attribute selectors
  const style=document.createElement('style');
  style.id='p2-red-style';
  let css='';
  // For each gate, when active-p2-N is on the SVG, color that gate's text red
  // The SVG channels use classes like .g{N} or we rely on the SVG internal CSS
  // We'll add a subtle red glow overlay via the SVG classList
  for(let g=1;g<=64;g++){
    // Target gate number labels in the SVG that have data-gate attribute or class
    css+=`.active-p2-${g} [data-gate="${g}"] text,`+
         `.active-p2-${g} .gate-label-${g},`+
         `.active-p2-${g} [class~="g${g}n"] { fill:#f87171!important; }\n`;
  }
  style.textContent=css;
  document.head.appendChild(style);
}

// ── PLANET COL HELPERS ──
function ordered(list){return PLANET_ORDER.map(p=>list.find(x=>x.planet===p)).filter(Boolean);}

function fillPlanetCol(design,personality,dId,pId,isRed){
  const cls=isRed?'red2':'';
  const row=a=>`<div class="prow ${cls}">
    <span class="g">${PLANET_GLYPH[a.planet]||''}</span>
    <span class="nm">${PLANET_KA[a.planet]||a.planet}</span>
    <span class="gl"><span class="gate">${a.gate}</span>.<span class="line">${a.line}</span></span>
  </div>`;
  document.getElementById(dId).innerHTML=`<h3>${isRed?'დიზაინი II':'დიზაინი I'}</h3>`+ordered(design).map(row).join('');
  document.getElementById(pId).innerHTML=`<h3>${isRed?'პიროვნება II':'პიროვნება I'}</h3>`+ordered(personality).map(row).join('');
}

function fillPlanetColBox(design,personality,dId,pId){
  const row=a=>`<div class="prow red2">
    <span class="g">${PLANET_GLYPH[a.planet]||''}</span>
    <span class="nm">${PLANET_KA[a.planet]||a.planet}</span>
    <span class="gl"><span class="gate">${a.gate}</span>.<span class="line">${a.line}</span></span>
  </div>`;
  document.getElementById(dId).innerHTML=`<h3>დიზაინი II</h3>`+ordered(design).map(row).join('');
  document.getElementById(pId).innerHTML=`<h3>პიროვნება II</h3>`+ordered(personality).map(row).join('');
}
