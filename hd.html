<!doctype html>
<html lang="ka">
<head>
<meta charset="utf-8">
<title>ადამიანის დიზაინი</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Serif+Georgian:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --void:     #050408;
  --deep:     #0a0812;
  --surface:  #110e1f;
  --raised:   #1a1630;
  --border:   rgba(180,140,90,.18);
  --border-h: rgba(180,140,90,.4)
  --gold:     #c8985a;
  --gold-lt:  #e8c07a;
  --gold-dim: #7a5c30;
  --ink:      #ede8dc;
  --ink-mid:  #a89e8a;
  --ink-dim:  #6a6258;
  --violet:   #7c3abf;
  --violet-lt:#a855f7;
  --indigo:   #3730a3;
  --indigo-lt:#6366f1;
  --ruby:     #c0392b;
  --emerald:  #059669;
  --r: 3px;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
  min-height:100vh;
  background:var(--void);
  color:var(--ink);
  font-family:'Noto Serif Georgian',serif;
  font-weight:400;
  line-height:1.6;
}

body{
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,58,191,.12), transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 60%, rgba(55,48,163,.08), transparent 50%),
    radial-gradient(ellipse 50% 60% at 90% 80%, rgba(192,57,43,.06), transparent 50%),
    var(--void);
}

/* ── noise overlay ── */
body::before{
  content:"";
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.6;
}

.page{
  position:relative;z-index:1;
  max-width:1480px;margin:0 auto;
  padding:48px 40px 100px;
}

/* ── header ── */
header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding-bottom:32px;margin-bottom:48px;
  border-bottom:1px solid var(--border);
  position:relative;
}
header::after{
  content:"";position:absolute;bottom:-1px;left:0;
  width:120px;height:1px;background:var(--gold);
}
.brand{
  font-family:'Cinzel',serif;
  font-size:2rem;font-weight:400;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--ink);
}
.brand span{color:var(--gold);}
.brand-sub{
  font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;
  color:var(--ink-dim);margin-top:4px;
  font-family:'Cinzel',serif;
}

/* ── form ── */
.form-wrap{
  background:linear-gradient(135deg, var(--surface) 0%, var(--deep) 100%);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:32px 36px;
  margin-bottom:52px;
  display:grid;
  grid-template-columns:1fr 1fr 2fr auto;
  gap:24px;align-items:end;
  position:relative;overflow:hidden;
}
.form-wrap::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}
.field label{
  display:block;
  font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--ink-dim);margin-bottom:10px;
  font-family:'Cinzel',serif;
}
.field input{
  width:100%;padding:13px 16px;
  background:var(--raised);color:var(--ink);
  border:1px solid var(--border);border-radius:var(--r);
  font:inherit;font-size:.9rem;
  transition:border-color .2s,background .2s;
  outline:none;
}
.field input:focus{border-color:var(--gold);background:#1f1b38;}
.city-hint{font-size:.72rem;color:var(--indigo-lt);margin-top:6px;min-height:14px;}

.btn-calc{
  padding:13px 28px;
  background:linear-gradient(135deg, var(--gold) 0%, #a07040 100%);
  color:#1a0f00;border:0;border-radius:var(--r);
  font-family:'Cinzel',serif;font-weight:600;
  font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;white-space:nowrap;
  transition:opacity .2s,transform .1s;
  box-shadow:0 4px 20px rgba(200,152,90,.2);
}
.btn-calc:hover{opacity:.9;}
.btn-calc:active{transform:translateY(1px);}
.btn-calc:disabled{opacity:.4;cursor:wait;}

.coords-row{
  grid-column:span 4;
  font-size:.72rem;color:var(--ink-dim);
  display:flex;gap:20px;margin-top:-12px;
}

.status{
  font-size:.88rem;color:var(--ink-dim);
  margin-bottom:28px;padding:0 4px;min-height:20px;
}
.status.error{color:#e05555;}

/* ── results hidden ── */
.hidden{display:none!important}

/* ── summary cards ── */
.summary{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;margin-bottom:40px;
}
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:20px 18px 16px;
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .2s;
}
.card:hover{border-color:var(--border-h);transform:translateY(-2px);}
.card::after{
  content:"";position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}
.card.primary::after{background:linear-gradient(90deg, transparent, var(--gold), transparent);}
.card .k{
  font-size:.55rem;letter-spacing:.28em;text-transform:uppercase;
  color:var(--ink-dim);margin-bottom:10px;
  font-family:'Cinzel',serif;
}
.card .v{
  font-family:'Cormorant Garamond',serif;
  font-size:.95rem;font-weight:400;
  color:var(--ink);line-height:1.4;
}
.card .v.sm{font-size:.95rem;}
.card .v.xs{font-size:.95rem;font-family:'Noto Serif Georgian',serif;line-height:1.5;}
  
/* ── chart area ── */
.chart-area{
  display:grid;
  grid-template-columns:190px 1fr 190px;
  gap:0;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:24px;
  margin-bottom:40px;
  min-height:660px;
  align-items:start;
  position:relative;overflow:hidden;
}
.chart-area::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}

.planet-col{
  padding:8px 6px;
  font-family:'JetBrains Mono',monospace;
  font-size:.73rem;
}
.planet-col h3{
  font-family:'Cinzel',serif;
  font-size:.7rem;font-weight:500;
  letter-spacing:.25em;text-transform:uppercase;
  margin-bottom:14px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
  text-align:center;
}
.planet-col.design h3{color:var(--violet-lt);}
.planet-col.personality h3{color:var(--indigo-lt);}

.prow{
  display:grid;
  grid-template-columns:20px 1fr auto;
  gap:5px;align-items:center;
  padding:5px 2px;
  border-bottom:1px solid rgba(180,140,90,.05);
}
.prow:hover{background:rgba(255,255,255,.02);}
.prow .g{
  font-family:'Cormorant Garamond',serif;
  font-size:1.1rem;color:var(--gold-dim);text-align:center;
}
.prow .nm{color:var(--ink-dim);font-size:.65rem;}
.prow .gl{font-variant-numeric:tabular-nums;font-size:.78rem;}
.prow .gl .gate{color:var(--ink);font-weight:400;}
.prow .gl .line{color:var(--gold-dim);}

#bodygraph{
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
#bodygraph svg{width:100%;height:auto;max-height:660px;display:block;}

/* ── details panels ── */
.details{
  display:grid;grid-template-columns:1.4fr 1fr;
  gap:24px;
}
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:28px 30px;
  position:relative;overflow:hidden;
}
.panel::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}
.panel h2{
  font-family:'Cinzel',serif;
  font-size:1rem;font-weight:500;
  letter-spacing:.15em;text-transform:uppercase;
  color:var(--gold);
  margin-bottom:20px;
  display:flex;align-items:baseline;gap:12px;
}
.panel h2 small{
  font-size:.6rem;letter-spacing:.2em;
  color:var(--ink-dim);font-weight:400;
  font-family:'Cinzel',serif;
}

.channel-list{display:flex;flex-direction:column;gap:6px;}
.ch-item{
  display:grid;
  grid-template-columns:70px 1fr auto;
  gap:10px;align-items:center;
  padding:9px 12px;
  background:var(--raised);
  border-left:2px solid var(--border);
  border-radius:0 var(--r) var(--r) 0;
  font-size:.85rem;
}
.ch-item.design{border-left-color:var(--violet);}
.ch-item.personality{border-left-color:var(--indigo-lt);}
.ch-item.mixed{border-left-color:var(--gold-dim);}
.ch-item .pair{
  font-family:'Cormorant Garamond',serif;
  font-size:1.1rem;color:var(--ink);font-weight:500;
}
.ch-item .cname{color:var(--ink-mid);font-style:italic;font-size:.8rem;}
.ch-item .ctag{
  font-size:.55rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink-dim);font-family:'Cinzel',serif;
}
.ch-item.design .ctag{color:var(--violet-lt);}
.ch-item.personality .ctag{color:var(--indigo-lt);}
.ch-item.mixed .ctag{color:var(--gold);}

.centers-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:8px;margin-bottom:20px;
}
.center-chip{
  padding:9px 10px;text-align:center;
  background:var(--raised);
  border:1px solid transparent;
  border-radius:var(--r);
  font-size:.78rem;color:var(--ink-dim);
  transition:border-color .2s;
}
.center-chip.on{
  color:var(--ink);
  border-color:var(--gold-dim);
  background:rgba(200,152,90,.06);
}
.center-chip.on::before{
  content:"● ";color:var(--gold);font-size:.5rem;vertical-align:middle;
}

.meta-info{font-size:.78rem;color:var(--ink-dim);line-height:2;}
.meta-info strong{color:var(--ink-mid);}

.loading{
  text-align:center;padding:80px 20px;
  color:var(--ink-dim);font-style:italic;
  letter-spacing:.15em;font-size:.9rem;
}

/* ── divider ── */
.section-label{
  font-family:'Cinzel',serif;
  font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;
  color:var(--ink-dim);margin-bottom:14px;
  display:flex;align-items:center;gap:12px;
}
.section-label::after{
  content:"";flex:1;height:1px;background:var(--border);
}

/* ── responsive ── */
@media(max-width:1000px){
  .form-wrap{grid-template-columns:1fr 1fr;}
  .coords-row{grid-column:span 2;}
  .chart-area{grid-template-columns:1fr;}
  .planet-col{order:2;}
  #bodygraph{order:1;}
  .details{grid-template-columns:1fr;}
  .summary{grid-template-columns:repeat(3,1fr);}
  .page{padding:28px 18px 60px;}
}
@media(max-width:600px){
  .summary{grid-template-columns:repeat(2,1fr);}
  .form-wrap{grid-template-columns:1fr;}
  .coords-row{grid-column:span 1;}
}
</style>
</head>
<body>
<div class="page">

<header>
  <div>
    <div class="brand">ადამიანის <span>დიზაინი</span></div>
    <div class="brand-sub">Human Design Chart</div>
  </div>
</header>

<form class="form-wrap" id="birth-form">
  <div class="field">
    <label>დაბადების თარიღი</label>
    <input id="date" type="date" required value="1948-04-09">
  </div>
  <div class="field">
    <label>დრო (ადგილობრივი)</label>
    <input id="time" type="time" required value="10:00">
  </div>
  <div class="field">
    <label>ქალაქი</label>
    <input id="city" type="text" placeholder="თბილისი, London, Paris…" oninput="searchCity()">
    <div class="city-hint" id="city-hint"></div>
  </div>
  <div>
    <button type="submit" class="btn-calc" id="submit-btn">გამოთვლა</button>
  </div>
  <input type="hidden" id="lat">
  <input type="hidden" id="lon">
  <input type="hidden" id="tz_name" value="UTC">
  <div class="coords-row">
    <span id="coords-display"></span>
    <span id="tz-display"></span>
  </div>
</form>

<div class="status" id="status"></div>

<section id="results" class="hidden">

  <div class="section-label">სულის ბარათი</div>
  <div class="summary" id="summary-cards"></div>

  <div class="chart-area">
    <div class="planet-col design" id="col-design"><h3>დიზაინი</h3></div>
    <div id="bodygraph"><div class="loading">იტვირთება…</div></div>
    <div class="planet-col personality" id="col-personality"><h3>პიროვნება</h3></div>
  </div>

  <div class="details">
    <div class="panel">
      <h2>არხები <small id="channel-count"></small></h2>
      <div class="channel-list" id="channel-list"></div>
    </div>
    <div class="panel">
      <h2>ცენტრები</h2>
      <div class="centers-grid" id="centers-list"></div>
      <div class="meta-info" id="meta"></div>
    </div>
  </div>

</section>
</div>

<script>
const API_BASE = "https://astrology-production-b165.up.railway.app";

const PLANET_ORDER = ["Sun","Earth","North Node","South Node","Moon","Mercury","Venus","Mars","Jupiter","Saturn","Uranus","Neptune","Pluto"];
const PLANET_GLYPH = {"Sun":"☉","Earth":"⊕","Moon":"☽","North Node":"☊","South Node":"☋","Mercury":"☿","Venus":"♀","Mars":"♂","Jupiter":"♃","Saturn":"♄","Uranus":"♅","Neptune":"♆","Pluto":"♇"};
const PLANET_KA = {"Sun":"მზე","Earth":"დედამიწა","Moon":"მთვარე","North Node":"ჩრდ. კვანძი","South Node":"სამხ. კვანძი","Mercury":"მერკური","Venus":"ვენერა","Mars":"მარსი","Jupiter":"იუპიტერი","Saturn":"სატურნი","Uranus":"ურანი","Neptune":"ნეპტუნი","Pluto":"პლუტონი"};
const CENTER_ORDER = ["Head","Ajna","Throat","G","Heart","Solar Plexus","Spleen","Sacral","Root"];
const CENTER_KA = {"Head":"გვირგვინი","Ajna":"აჯნა","Throat":"ყელი","G":"G ცენტრი","Heart":"გული","Solar Plexus":"მზის წნული","Spleen":"ელენთა","Sacral":"საკრალური","Root":"ფუძე"};
const TYPE_KA = {"Manifestor":"მანიფესტორი","Generator":"გენერატორი","Manifesting Generator":"მანიფ. გენერატორი","Projector":"პროექტორი","Reflector":"რეფლექტორი"};
const STRATEGY_KA = {"To Inform":"ინფორმირება","To Respond":"პასუხი","To Respond, then Inform":"პასუხი → ინფორმირება","Wait for the Invitation":"მოიცადე მოწვევას","Wait a Lunar Cycle (28 days)":"ელოდე მთვარის ციკლს"};

let gatePositions = null, svgDoc = null;

let _cityTimer = null;
function searchCity(){
  clearTimeout(_cityTimer);
  _cityTimer = setTimeout(async()=>{
    const city = document.getElementById("city").value.trim();
    const hint = document.getElementById("city-hint");
    if(city.length<2){hint.textContent="";return;}
    hint.textContent="⏳ ძიება…";
    try{
      const r = await fetch(API_BASE+"/geocode",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({city})});
      const raw = await r.text();
      let d; try{d=JSON.parse(raw);}catch(e){hint.textContent="❌ Server error";return;}
      if(d.error){hint.textContent="❌ "+d.error;return;}
      document.getElementById("lat").value=d.lat;
      document.getElementById("lon").value=d.lon;
      document.getElementById("tz_name").value=d.tz_name||"UTC";
      hint.textContent="📍 "+d.display;
      document.getElementById("coords-display").textContent=d.lat.toFixed(4)+"°, "+d.lon.toFixed(4)+"°";
      document.getElementById("tz-display").textContent="🕐 "+(d.tz_name||"UTC");
    }catch(e){hint.textContent="❌ "+e.message;}
  },600);
}

async function loadBodygraph(){
  const [svgText,posJson] = await Promise.all([
    fetch(API_BASE+"/static/human_prepared.svg").then(r=>r.text()),
    fetch(API_BASE+"/static/gate_positions.json").then(r=>r.json())
  ]);
  gatePositions=posJson;
  const wrap=document.getElementById("bodygraph");
  const parser=new DOMParser();
  const svgDom=parser.parseFromString(svgText,"image/svg+xml");
  const importedSvg=document.importNode(svgDom.documentElement,true);
  wrap.innerHTML="";
  wrap.appendChild(importedSvg);
  svgDoc=wrap.querySelector("svg");
  if(!svgDoc)throw new Error("SVG not found");
  svgDoc.setAttribute("preserveAspectRatio","xMidYMid meet");
  svgDoc.removeAttribute("width");svgDoc.removeAttribute("height");
  svgDoc.setAttribute("viewBox","480 80 500 660");
  const svgStyle=svgDoc.querySelector("#hd-activation");
  if(svgStyle){
    const old=document.getElementById("hd-activation-doc");
    if(old)old.remove();
    const docStyle=document.createElement("style");
    docStyle.id="hd-activation-doc";
    docStyle.textContent=svgStyle.textContent;
    document.head.appendChild(docStyle);
    svgStyle.remove();
  }
  svgDoc.querySelectorAll(".detail-part").forEach(el=>el.style.setProperty("display","none","important"));
}

function clearActivations(){
  if(!svgDoc)return;
  const toRemove=[];
  svgDoc.classList.forEach(c=>{if(c.startsWith("active-p-")||c.startsWith("active-d-")||c.startsWith("active-b-")||c.startsWith("detail-on-")||c.startsWith("center-active-"))toRemove.push(c);});
  toRemove.forEach(c=>svgDoc.classList.remove(c));
  svgDoc.querySelectorAll(".detail-part").forEach(el=>el.style.setProperty("display","none","important"));
}

function activateGate(gate,src){
  if(!src)return;
  let cls=null;
  if(src.p&&src.d)cls="active-b-"+gate;
  else if(src.p)cls="active-p-"+gate;
  else if(src.d)cls="active-d-"+gate;
  if(cls)svgDoc.classList.add(cls);
}

function colorGateLines(gate,src){
  if([10,20,34,57].includes(gate))return;
  let cls=null;
  if(src.p&&src.d)cls="active-b-"+gate;
  else if(src.p)cls="active-p-"+gate;
  else if(src.d)cls="active-d-"+gate;
  if(cls)svgDoc.classList.add(cls);
}

function render(chart){
  window._chart=chart;
  clearActivations();

  Object.entries(chart.gate_sources).forEach(([g,src])=>{
    const gi=parseInt(g,10);
    activateGate(gi,src);
    colorGateLines(gi,src);
  });
  chart.defined_centers.forEach(c=>svgDoc.classList.add("center-active-"+c.replace(/ /g,"")));

  if(chart.integration?.n){
    const n=chart.integration.n;
    svgDoc.classList.add("detail-on-"+n);
    const el=svgDoc.querySelector(`.detail-part[data-detail="${n}"]`);
    if(el)el.style.setProperty("display","block","important");
  }

  const cards=[
    {k:"ტიპი",            v:TYPE_KA[chart.type]||chart.type,                primary:true},
    {k:"სტრატეგია",       v:STRATEGY_KA[chart.strategy]||chart.strategy,    sm:true},
    {k:"ავტორიტეტი",      v:chart.authority||"",                            sm:true},
    {k:"პროფილი",         v:chart.profile||"",                              primary:true},
    {k:"არარეალ. 'მე'",  v:chart.not_self||"",                             sm:true},
    {k:"რეალ. 'მე'",      v:chart.signature||"",                            sm:true},
    {k:"მთავარი ნიჭი",    v:chart.sun_gift||"",                             sm:true},
    {k:"განსაზღვრება",    v:chart.definition||"",                           sm:true},
    {k:"ინკარნ. ჯვარი",   v:chart.incarnation_cross||"",                    xs:true},
    {k:"საკვები",         v:chart.digestion||"",                            sm:true},
    {k:"გრძნობა",         v:chart.sense||"",                                sm:true},
    {k:"გარემო",          v:chart.environment||"",                          sm:true},
    {k:"მოტივაცია",       v:chart.motivation||"",                           sm:true},
    {k:"პერსპექტივა",     v:chart.perspective||"",                          sm:true},
    {k:"სხვა ნიჭები",     v:(chart.other_gifts||[]).join(", "),             xs:true},
  ];

  document.getElementById("summary-cards").innerHTML=cards.map(c=>
    `<div class="card${c.primary?' primary':''}">
      <div class="k">${c.k}</div>
      <div class="v${c.xs?' xs':c.sm?' sm':''}">${c.v||"—"}</div>
    </div>`
  ).join("");

  const planetRow=(a,tag)=>`
    <div class="prow ${tag}">
      <span class="g">${PLANET_GLYPH[a.planet]||""}</span>
      <span class="nm">${PLANET_KA[a.planet]||a.planet}</span>
      <span class="gl"><span class="gate">${a.gate}</span>.<span class="line">${a.line}</span></span>
    </div>`;

  const ordered=list=>PLANET_ORDER.map(p=>list.find(x=>x.planet===p)).filter(Boolean);
  document.getElementById("col-design").innerHTML=`<h3>დიზაინი</h3>`+ordered(chart.design).map(a=>planetRow(a,"d")).join("");
  document.getElementById("col-personality").innerHTML=`<h3>პიროვნება</h3>`+ordered(chart.personality).map(a=>planetRow(a,"p")).join("");

  const CHAN_TAG_KA={"design":"დიზაინი","personality":"პიროვნება","mixed":"შერეული"};
  document.getElementById("channel-count").textContent=`${chart.defined_channels.length} არხი`;
  document.getElementById("channel-list").innerHTML=chart.defined_channels.map(c=>
    `<div class="ch-item ${c.type}">
      <span class="pair">${c.gate_a}–${c.gate_b}</span>
      <span class="cname">${c.name}</span>
      <span class="ctag">${CHAN_TAG_KA[c.type]||c.type}</span>
    </div>`
  ).join("")||`<div style="color:var(--ink-dim);font-style:italic;font-size:.85rem">განსაზღვრული არხები არ არის</div>`;

  const defC=new Set(chart.defined_centers);
  document.getElementById("centers-list").innerHTML=CENTER_ORDER.map(c=>
    `<div class="center-chip${defC.has(c)?' on':''}">${CENTER_KA[c]||c}</div>`
  ).join("");

  const inp=chart.input;
  document.getElementById("meta").innerHTML=`
    <div><strong>დაბადება:</strong> ${inp.date} ${inp.time}</div>
    <div><strong>ადგილი:</strong> ${inp.resolved_place}</div>
    <div><strong>UTC:</strong> ${inp.utc_time}</div>
    <div><strong>დიზაინი:</strong> ${chart.design_time_utc}</div>
  `;

  document.getElementById("results").classList.remove("hidden");
}

document.getElementById("birth-form").addEventListener("submit",async ev=>{
  ev.preventDefault();
  const btn=document.getElementById("submit-btn");
  const stat=document.getElementById("status");
  const lat=document.getElementById("lat").value;
  const lon=document.getElementById("lon").value;
  const tz_name=document.getElementById("tz_name").value;
  const city=document.getElementById("city").value.trim();
  if(!lat||!lon){stat.className="status error";stat.textContent="⚠ პირველ შეიყვანეთ ქალაქი";return;}
  stat.className="status";stat.textContent="იტვირთება…";btn.disabled=true;
  try{
    if(!svgDoc)await loadBodygraph();
    const r=await fetch(API_BASE+"/api/hd_chart",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({date:document.getElementById("date").value,time:document.getElementById("time").value,lat:parseFloat(lat),lon:parseFloat(lon),tz_name,place:city})
    });
    const raw=await r.text();
    let chart;
    try{chart=JSON.parse(raw);}catch(_){throw new Error("Backend returned HTTP "+r.status+". Check Railway logs.");}
    if(!r.ok)throw new Error(chart.error||"HTTP "+r.status);
    render(chart);
    stat.textContent="";
  }catch(e){stat.className="status error";stat.textContent="შეცდომა: "+e.message;}
  finally{btn.disabled=false;}
});

loadBodygraph().catch(e=>{
  document.getElementById("bodygraph").innerHTML=`<div class="loading" style="color:#e05555">ვერ ჩაიტვირთა: ${e.message}</div>`;
});
</script>
</body>
</html>
