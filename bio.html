<style>
  :root {
    --bg: #080b10;
    --surface: rgba(255,255,255,0.032);
    --surface2: rgba(255,255,255,0.05);
    --border: rgba(200,210,255,0.09);
    --physical: #00e5ff;
    --emotional: #ff4d8d;
    --intellectual: #a78bfa;
    --intuitive: #34d399;
    --text: #eaedf5;
    --muted: #5e6a84;
    --accent: #00e5ff;
    --glow-p: 0 0 24px rgba(0,229,255,0.3);
    --glow-e: 0 0 24px rgba(255,77,141,0.3);
    --glow-i: 0 0 24px rgba(167,139,250,0.3);
    --glow-t: 0 0 24px rgba(52,211,153,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "DM Sans", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Deep aurora layers */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(90,60,180,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 85% 10%, rgba(0,160,200,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 50% 110%, rgba(30,20,60,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 50%, rgba(8,11,16,1) 40%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle grain texture */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 160px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* Animated aurora pulse */
  @keyframes auroraPulse {
    0%   { opacity: 0.5; transform: scale(1) translateY(0); }
    50%  { opacity: 0.8; transform: scale(1.05) translateY(-20px); }
    100% { opacity: 0.5; transform: scale(1) translateY(0); }
  }

  /* Canvas stars rendered via JS */
  #starsCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 56px 0 40px;
    position: relative;
  }

  .header-eyebrow {
    font-family: "Space Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s forwards;
  }

  header h1 {
    font-family: "Playfair Display", serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff 0%, var(--accent) 50%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  .header-subtitle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── INPUT PANEL ── */
  .input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
  }

  .input-panel::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .panel-title {
    font-family: "Space Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 20px;
    align-items: end;
  }

  @media (max-width: 768px) {
    .input-grid { grid-template-columns: 1fr 1fr; }
    .input-panel { padding: 24px; }
  }
  @media (max-width: 480px) {
    .input-grid { grid-template-columns: 1fr; }
  }

  .field { display: flex; flex-direction: column; gap: 8px; }

  .field label {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .field input, .field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: "DM Sans", sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
  }

  .field select option { background: var(--surface2); }

  /* Period toggle buttons */
  .period-toggle {
    display: flex;
    gap: 8px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .period-btn {
    flex: 1;
    padding: 9px 14px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: "Space Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .period-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    box-shadow: var(--glow-p);
  }

  .btn-calculate {
    background: linear-gradient(135deg, var(--accent), #0070ff);
    color: #000;
    font-family: "Space Mono", monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
  }

  .btn-calculate:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,229,255,0.4);
  }

  .btn-calculate:active { transform: translateY(0); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    padding: 20px 28px;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  .legend-dot {
    width: 36px; height: 3px;
    border-radius: 2px;
    position: relative;
  }

  .legend-dot::after {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 8px; height: 8px;
    border-radius: 50%;
    background: inherit;
    box-shadow: 0 0 8px currentColor;
  }

  .legend-label { color: var(--text); }
  .legend-sub { color: var(--muted); font-size: 11px; font-family: "Space Mono", monospace; }

  /* ── CHART AREA ── */
  .chart-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }

  .chart-wrapper::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(167,139,250,0.5), transparent);
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .chart-title {
    font-family: "Playfair Display", serif;
    font-size: 20px;
    color: var(--text);
  }

  .chart-period-label {
    font-family: "Space Mono", monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
  }

  canvas#bioChart {
    width: 100% !important;
    max-height: 200px !important;
    border-radius: 10px;
  }

  /* ── TODAY CARD ── */
  .today-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  @media (max-width: 768px) { .today-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 400px) { .today-grid { grid-template-columns: 1fr; } }

  .cycle-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 24px 20px;
    border: 1px solid var(--border);
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .cycle-card:hover {
    transform: translateY(-4px);
  }

  .cycle-card::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.07;
    background: radial-gradient(circle at 50% 0%, var(--card-color), transparent 70%);
  }

  .cycle-card .card-icon {
    font-size: 28px;
    margin-bottom: 10px;
  }

  .cycle-card .card-name {
    font-family: "Space Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .cycle-card .card-value {
    font-family: "Playfair Display", serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--card-color);
    line-height: 1;
    margin-bottom: 8px;
    text-shadow: 0 0 20px var(--card-color);
  }

  .cycle-card .card-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .cycle-bar-bg {
    height: 5px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    overflow: hidden;
  }

  .cycle-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--card-color);
    box-shadow: 0 0 8px var(--card-color);
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
  }

  .cycle-card .cycle-days {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── TABLE ── */
  .table-section {
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
  }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .table-title {
    font-family: "Playfair Display", serif;
    font-size: 22px;
  }

  .table-controls {
    display: flex;
    gap: 8px;
  }

  .tab-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: "Space Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-color: rgba(100,180,255,0.3);
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  thead th {
    padding: 14px 16px;
    text-align: left;
    font-family: "Space Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
  }

  tbody tr {
    border-bottom: 1px solid rgba(100,180,255,0.05);
    transition: background 0.15s;
  }

  tbody tr:hover { background: rgba(0,229,255,0.03); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr.today-row { background: rgba(0,229,255,0.06) !important; }

  tbody td {
    padding: 12px 16px;
    color: var(--text);
  }

  tbody td:first-child {
    font-family: "Space Mono", monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .value-cell {
    font-family: "Space Mono", monospace;
    font-size: 12px;
    font-weight: 700;
  }

  .bar-cell { min-width: 80px; }

  .mini-bar {
    height: 4px;
    border-radius: 2px;
    position: relative;
    background: rgba(255,255,255,0.05);
    overflow: hidden;
  }

  .mini-bar-fill {
    position: absolute;
    top: 0; left: 50%;
    height: 100%;
    border-radius: 2px;
    transform-origin: left;
  }

  .phase-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-family: "Space Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid;
  }

  .phase-high { color: #34d399; border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.07); }
  .phase-low { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.07); }
  .phase-critical { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.07); }
  .phase-rising { color: #60a5fa; border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.07); }
  .phase-falling { color: #c084fc; border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.07); }

  /* ── MINI SPARKLINES ── */
  .sparkline-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.8s 0.75s forwards;
  }

  @media (max-width: 600px) { .sparkline-row { grid-template-columns: 1fr; } }

  .spark-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .spark-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .spark-name {
    font-family: "Space Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .spark-val {
    font-family: "Playfair Display", serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--spark-color);
  }

  .spark-canvas { width: 100% !important; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 32px 0 0;
    color: var(--muted);
    font-size: 12px;
    font-family: "Space Mono", monospace;
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    margin-top: 40px;
    opacity: 0;
    animation: fadeUp 0.8s 1s forwards;
  }

  .today-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 20px;
    padding: 4px 12px 4px 8px;
    font-family: "Space Mono", monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .today-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* scroll for table on mobile */
  .table-scroll { overflow-x: auto; }

  .no-data {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: "Space Mono", monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
  }
</style>
